/* ============ ✏️ CRUCIGRAMA ============ */
function buildCrossword(words){
  /* ── Usa COMA como separador interno para manejar coordenadas negativas ──
     Las claves "r-c" rompen el split cuando r<0 (ej. "-1-2" → ["","1","2"])
     Internamente usamos "r,c" y solo al normalizar pasamos a "r-c" (siempre >=0) */
  const key  = (r,c) => r+','+c;
  const parseKey = k => k.split(',').map(Number);

  const placed=[];
  const cells={};

  const put=(w,r,c,dir,es)=>{
    for(let k=0;k<w.length;k++){
      const rr=r+(dir==='V'?k:0), cc=c+(dir==='H'?k:0);
      cells[key(rr,cc)]=w[k];
    }
    placed.push({w,es,r,c,dir});
  };

  const canPlace=(w,r,c,dir)=>{
    for(let k=0;k<w.length;k++){
      const rr=r+(dir==='V'?k:0), cc=c+(dir==='H'?k:0);
      const cur=cells[key(rr,cc)];
      if(cur && cur!==w[k]) return false;        /* conflicto de letra */
      if(!cur){
        /* evitar palabras paralelas adyacentes */
        if(dir==='H'){
          if(cells[key(rr-1,cc)] || cells[key(rr+1,cc)]) return false;
        }else{
          if(cells[key(rr,cc-1)] || cells[key(rr,cc+1)]) return false;
        }
      }
    }
    /* celdas justo antes y después deben estar vacías (sin continuación) */
    const bR=r+(dir==='V'?-1:0), bC=c+(dir==='H'?-1:0);
    const aR=r+(dir==='V'?w.length:0), aC=c+(dir==='H'?w.length:0);
    if(cells[key(bR,bC)] || cells[key(aR,aC)]) return false;
    return true;
  };

  const sorted=[...words].sort((a,b)=>b.w.length-a.w.length);
  put(sorted[0].w, 0, 0, 'H', sorted[0].es);

  for(let i=1;i<sorted.length;i++){
    const {w,es}=sorted[i]; let done=false;
    outer:
    for(const p of placed){
      for(let pk=0;pk<p.w.length;pk++){
        for(let wk=0;wk<w.length;wk++){
          if(p.w[pk]!==w[wk]) continue;
          const dir=p.dir==='H'?'V':'H';
          const r=dir==='V'?p.r-wk:p.r+pk;
          const c=dir==='V'?p.c+pk:p.c-wk;
          if(canPlace(w,r,c,dir)){ put(w,r,c,dir,es); done=true; break outer; }
        }
      }
    }
    /* si no se pudo intersectar, se omite para mantener el crucigrama conexo */
  }

  /* ── Normalizar coordenadas a >=0 usando parseKey (coma segura) ── */
  let minR=Infinity,minC=Infinity,maxR=-Infinity,maxC=-Infinity;
  Object.keys(cells).forEach(k=>{
    const[r,c]=parseKey(k);
    if(r<minR)minR=r; if(c<minC)minC=c;
    if(r>maxR)maxR=r; if(c>maxC)maxC=c;
  });

  const norm={};
  Object.keys(cells).forEach(k=>{
    const[r,c]=parseKey(k);
    norm[(r-minR)+'-'+(c-minC)]=cells[k];   /* ahora coordenadas >=0, ok usar '-' */
  });

  const entries=placed.map(p=>({
    w:p.w, es:p.es,
    r:p.r-minR, c:p.c-minC, dir:p.dir
  }));

  return { cells:norm, rows:maxR-minR+1, cols:maxC-minC+1, entries };
}

/* ── Validación post-build: devuelve array de errores (vacío = OK) ── */
function validateCrossword(cw){
  const errors=[];
  cw.entries.forEach(e=>{
    for(let k=0;k<e.w.length;k++){
      const rr=e.r+(e.dir==='V'?k:0), cc=e.c+(e.dir==='H'?k:0);
      const id=rr+'-'+cc;
      const cell=cw.cells[id];
      if(!cell){
        errors.push(`"${e.w}" k=${k}: celda ${id} no existe en grid`);
      } else if(cell!==e.w[k]){
        errors.push(`Conflicto en ${id}: grid="${cell}" word="${e.w}" necesita "${e.w[k]}"`);
      }
    }
  });
  /* verificar que todas las celdas del grid pertenecen a al menos una entry */
  const covered=new Set();
  cw.entries.forEach(e=>{
    for(let k=0;k<e.w.length;k++){
      const rr=e.r+(e.dir==='V'?k:0), cc=e.c+(e.dir==='H'?k:0);
      covered.add(rr+'-'+cc);
    }
  });
  Object.keys(cw.cells).forEach(id=>{ if(!covered.has(id)) errors.push(`Celda huérfana: ${id}="${cw.cells[id]}"`); });
  return errors;
}

function startCrossword(){
  markLetterGameTried('crossword');

  /* ── Intentar hasta 10 veces hasta obtener un crucigrama válido ── */
  let cw, errors=[], attempts=0;
  const usedKeys = (S.usedCwKeys=S.usedCwKeys||{})[CW.id] || [];

  while(attempts<10){
    const picks=gameVocab(8);
    const wordKey=picks.map(v=>v.en).sort().join('|');

    /* evitar repetir la misma combinación de palabras */
    if(usedKeys.includes(wordKey) && attempts<7){ attempts++; continue; }

    cw=buildCrossword(picks.map(v=>({w:v.en.toUpperCase(), es:v.es})));
    errors=validateCrossword(cw);

    if(errors.length===0){
      /* guardar clave usada (máx 5 por mundo para no llenar localStorage) */
      if(!S.usedCwKeys) S.usedCwKeys={};
      if(!S.usedCwKeys[CW.id]) S.usedCwKeys[CW.id]=[];
      S.usedCwKeys[CW.id].push(wordKey);
      if(S.usedCwKeys[CW.id].length>5) S.usedCwKeys[CW.id].shift();
      save();
      break;
    }
    attempts++;
  }

  if(errors.length>0){
    console.warn('[Crucigrama] Errores tras 10 intentos:', errors);
    /* mostrar de todas formas el mejor resultado con advertencia */
  }

  /* numerar entradas por posición (arriba→abajo, izquierda→derecha) */
  const startMap={}; let num=0;
  cw.entries.slice().sort((a,b)=>a.r-b.r||a.c-b.c)
    .forEach(e=>{ const k=e.r+'-'+e.c; if(!(k in startMap)) startMap[k]=++num; e.num=startMap[k]; });

  GM={ game:'cw', cw, dirty:true, active:null, activeDir:'H',
       revealed:0, debug:false, filled:{}, locked:{} };
  go('scr-game');
  gameHeader('✏️ Crucigrama',
    `<button id="cw-dbg" onclick="cwToggleDebug()" title="Modo depuración" `+
    `style="background:var(--deep);border:1px solid rgba(255,246,232,.2);color:var(--cream-dim);border-radius:8px;padding:4px 9px;font-size:.8rem;cursor:pointer">🔍</button>`);
  gameBruno('Escribí en <b>inglés</b> la palabra de cada pista. La ayuda en español está al lado. ¿Atascado? Revelá una letra por 10 🪙 — o activá 🔍 para ver las respuestas. 🦴');
  renderCW();
}

/* ── Modo depuración: muestra/oculta respuestas en la cuadrícula ── */
function cwToggleDebug(){
  GM.debug=!GM.debug;
  const btn=document.getElementById('cw-dbg');
  if(btn) btn.style.opacity=GM.debug?'1':'0.5';
  renderCW();
  if(GM.debug){
    gameBruno('🔍 <b>Modo depuración activo</b> — las respuestas están resaltadas en naranja. Solo para verificar la calidad de la cuadrícula. ¡Probá sin mirar primero! 🦴');
  }else{
    gameBruno('Modo depuración desactivado. ¡A resolverlo por tu cuenta! 🐶');
  }
}

function renderCW(){
  const {cw}=GM;
  /* mapa de número de inicio por celda */
  const startNum={};
  cw.entries.forEach(e=>{ const k=e.r+'-'+e.c; if(!startNum[k]) startNum[k]=e.num; });

  /* ── Cuadrícula ── */
  let grid='<div class="cw-wrap"><div class="cwgrid" style="grid-template-columns:repeat('+cw.cols+',1fr)">';
  for(let r=0;r<cw.rows;r++) for(let c=0;c<cw.cols;c++){
    const id=r+'-'+c;
    if(cw.cells[id]===undefined){ grid+='<div class="cwcell void"></div>'; continue; }
    const n=startNum[id]?`<span class="cnum">${startNum[id]}</span>`:'';
    const dbgStyle=GM.debug
      ? `style="background:#FF9C3A;color:#1E2B30;font-family:Fredoka,sans-serif;font-weight:700;font-size:.95rem;display:flex;align-items:center;justify-content:center;"`
      : '';
    const dbgContent=GM.debug
      ? `<div class="cwcell ${GM.locked&&GM.locked[id]?'lockd':''}" id="cwc-${id}" style="position:relative;width:32px;height:32px;border-radius:6px;${dbgStyle.slice(7,-1)}">${n}${cw.cells[id]}</div>`
      : `<div class="cwcell ${GM.locked&&GM.locked[id]?'lockd':''}" id="cwc-${id}">${n}<input maxlength="1" inputmode="latin" autocomplete="off" spellcheck="false" data-id="${id}" oninput="cwInput(this)" onfocus="cwFocus('${id}')" onclick="cwClick(this,'${id}')"></div>`;
    grid+=dbgContent;
  }
  grid+='</div></div>';

  /* ── Pistas ── */
  const clues='<div class="cwclues">'+cw.entries.slice().sort((a,b)=>a.num-b.num).map(e=>
    `<button class="cwclue ${GM.locked&&cwWordLocked(e)?'ok':''}" id="clue-${e.num}-${e.dir}" onclick="cwGoto(${e.r},${e.c},'${e.dir}')">
      <b>${e.num}${e.dir==='H'?'→':'↓'}</b> <span class="cwq">${e.es}</span>
      <span style="opacity:.55;font-size:.8rem;margin-left:4px">(${e.w.length} letras)</span>
    </button>`).join('')+'</div>';

  document.getElementById('game-stage').innerHTML =
    clues +
    '<div class="btnrow" style="margin-bottom:10px">'+
    '<button class="btn btn-mint" onclick="cwReveal()">💡 Revelar letra (10 🪙)</button>'+
    '<button class="btn btn-coral" onclick="cwCheck()">Comprobar ✔</button>'+
    '</div>'+
    grid;

  restoreCW();
}

function cwWordLocked(e){
  if(!GM.locked) return false;
  for(let k=0;k<e.w.length;k++){
    const rr=e.r+(e.dir==='V'?k:0), cc=e.c+(e.dir==='H'?k:0);
    if(!GM.locked[rr+'-'+cc]) return false;
  }
  return true;
}

function restoreCW(){
  if(!GM.filled) GM.filled={};
  Object.keys(GM.filled).forEach(id=>{
    const inp=document.querySelector(`input[data-id="${id}"]`);
    if(inp){
      inp.value=GM.filled[id];
      if(GM.locked&&GM.locked[id]){ inp.parentElement.classList.add('lockd'); inp.readOnly=true; }
    }
  });
}

function cwFocus(id){
  GM.active=id;
}

function cwClick(inp, id){
  /* si el usuario toca la celda activa, alterna la dirección */
  if(GM.active===id){
    GM.activeDir=GM.activeDir==='H'?'V':'H';
    cwHighlightWord(id);
  }
  GM.active=id;
}

function cwHighlightWord(id){
  document.querySelectorAll('.cwcell').forEach(c=>c.classList.remove('cw-active-word'));
  if(!id) return;
  const[r,c]=id.split('-').map(Number);
  const dir=GM.activeDir||'H';
  /* encontrar la entry que contiene esta celda en esa dirección */
  const e=GM.cw.entries.find(en=>{
    if(en.dir!==dir) return false;
    for(let k=0;k<en.w.length;k++){
      const rr=en.r+(dir==='V'?k:0), cc=en.c+(dir==='H'?k:0);
      if(rr===r&&cc===c) return true;
    }
    return false;
  });
  if(e){
    for(let k=0;k<e.w.length;k++){
      const rr=e.r+(e.dir==='V'?k:0), cc=e.c+(e.dir==='H'?k:0);
      const cell=document.getElementById('cwc-'+rr+'-'+cc);
      if(cell) cell.classList.add('cw-active-word');
    }
  }
}

function cwInput(inp){
  const id=inp.dataset.id;
  inp.value=(inp.value||'').toUpperCase().replace(/[^A-Z]/g,'');
  if(!GM.filled) GM.filled={};
  GM.filled[id]=inp.value;
  if(inp.value) cwAdvance(id);
}

function cwAdvance(id){
  /* avanzar al siguiente input siguiendo la dirección activa */
  const[r,c]=id.split('-').map(Number);
  const dir=GM.activeDir||'H';
  const nextId=dir==='H'?(r+'-'+(c+1)):((r+1)+'-'+c);
  const nextInp=document.querySelector(`input[data-id="${nextId}"]`);
  if(nextInp && !nextInp.readOnly){ nextInp.focus(); GM.active=nextId; }
}

function cwGoto(r,c,dir){
  GM.activeDir=dir;
  document.querySelectorAll('.cwclue').forEach(b=>b.classList.remove('on'));
  const btn=document.getElementById('clue-'+(GM.cw.entries.find(e=>e.r===r&&e.c===c&&e.dir===dir)||{num:'?'}).num+'-'+dir);
  if(btn) btn.classList.add('on');
  const inp=document.querySelector(`input[data-id="${r}-${c}"]`);
  if(inp){ inp.focus(); GM.active=r+'-'+c; cwHighlightWord(r+'-'+c); }
}

function cwReveal(){
  if(GM.debug){ toast('Desactivá el modo 🔍 primero'); return; }
  if(S.coins<10){ toast('Necesitás 10 🪙 para revelar una letra'); return; }
  /* priorizar: celda activa → primera vacía */
  let target=GM.active;
  const empties=Object.keys(GM.cw.cells).filter(id=>{
    const inp=document.querySelector(`input[data-id="${id}"]`);
    return inp && !inp.value && !(GM.locked&&GM.locked[id]);
  });
  if(!target||!GM.cw.cells[target]||
     (document.querySelector(`input[data-id="${target}"]`)||{}).value){
    target=empties[0];
  }
  if(!target){ toast('No quedan celdas por revelar'); return; }
  S.coins-=10; save();
  const uiCoins=document.getElementById('ui-coins'); if(uiCoins) uiCoins.textContent=S.coins;
  if(!GM.filled) GM.filled={};
  GM.filled[target]=GM.cw.cells[target];
  GM.revealed++;
  const inp=document.querySelector(`input[data-id="${target}"]`);
  if(inp){ inp.value=GM.cw.cells[target]; }
  gameBruno(`Bruno reveló la letra <b>${GM.cw.cells[target]}</b> 🦴 ¡Seguí!`);
}

function cwCheck(){
  const {cw}=GM;
  if(!GM.locked) GM.locked={};
  let allOk=true, anyWrong=false, anyCorrect=false;

  cw.entries.forEach(e=>{
    let wordOk=true;
    for(let k=0;k<e.w.length;k++){
      const rr=e.r+(e.dir==='V'?k:0), cc=e.c+(e.dir==='H'?k:0);
      const id=rr+'-'+cc;
      const inp=document.querySelector(`input[data-id="${id}"]`);
      const val=(inp&&inp.value||'').toUpperCase();
      if(val!==cw.cells[id]){ wordOk=false; if(val) anyWrong=true; }
    }
    const clue=document.getElementById('clue-'+e.num+'-'+e.dir);
    if(wordOk){
      anyCorrect=true;
      clue&&clue.classList.add('ok');
      /* bloquear celdas correctas */
      for(let k=0;k<e.w.length;k++){
        const rr=e.r+(e.dir==='V'?k:0), cc=e.c+(e.dir==='H'?k:0);
        const id=rr+'-'+cc;
        GM.locked[id]=true;
        const inp=document.querySelector(`input[data-id="${id}"]`);
        if(inp){ inp.readOnly=true; inp.parentElement.classList.add('lockd'); }
      }
    } else allOk=false;
  });

  if(allOk){
    learnWords(cw.entries.map(e=>e.w.toLowerCase()));
    const xp=Math.max(30,70-GM.revealed*5);
    finishGame('✏️','¡Crucigrama resuelto!',
      `Completaste las ${cw.entries.length} palabras en inglés${GM.revealed?' (con '+GM.revealed+' pistas)':' ¡sin pistas!'}. Bruno está orgullosísimo. 🐾`,
      xp, 30);
  } else if(anyCorrect && !anyWrong){
    gameBruno('¡Algunas palabras correctas bloqueadas en verde! Completá las que faltan. 🦴');
  } else if(anyWrong){
    gameBruno('Hay letras que no coinciden. Las palabras correctas se pusieron en verde. ¡Revisá las demás! 🐶');
  } else {
    gameBruno('Todavía faltan letras. ¡Completá la cuadrícula y comprobá! 🦴');
  }
}

/* =====================================================
   BOSS FIGHT — boss del mundo actual
   ===================================================== */
let bossHP = 100;
function startBoss(){
  SP = { mode:'boss', i:0, hearts:3, mistakes:0 };
  bossHP = 100;
  go('scr-story');
  document.getElementById('mainnav').style.display='none';
  renderBossQ();
}

function renderBossQ(){
  updatePlayerTop();
  const q = CW.boss.questions[SP.i];
  const stage = document.getElementById('story-stage');
  if(bossHP<=0){ bossWin(); return; }
  if(!q){ bossLose(); return; }

  stage.innerHTML = `
    <div class="bossheader">
      <span class="bossface">${CW.boss.emoji}</span>
      <div class="bossname">${CW.boss.name}</div>
      <div class="bosshp"><div class="bosshpfill" style="width:${bossHP}%"></div></div>
      <div class="bosshp-label">HP ${bossHP}/100</div>
    </div>
    <div class="scenecard">
      <div class="speaker">⚔️ Ataque ${SP.i+1}/${CW.boss.questions.length}</div>
      <div class="dialogue">${q.q}</div>
    </div>
    <div class="options">${shuffle(q.opts.map((o,i)=>({o,i}))).map(p=>
      `<button class="opt" onclick="bossAnswer(this,${p.i})">${p.o}</button>`).join('')}
    </div>
    <div class="feedback" id="fb"></div>`;
}

function bossAnswer(btn, idx){
  const q = CW.boss.questions[SP.i];
  const ok = idx === q.a;
  registerAnswer(ok);
  const fb = document.getElementById('fb');
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===q.opts[q.a]) b.classList.add('correct');
  });
  if(ok){
    bossHP = Math.max(0, bossHP - 20);
    fb.className='feedback ok'; fb.textContent=`✅ ¡Golpe directo! -20 HP al boss`;
  }else{
    btn.classList.add('wrong');
    fb.className='feedback bad'; fb.textContent=`❌ ${CW.boss.name} te golpea. Respuesta: "${q.opts[q.a]}"`;
    SP.hearts--;
    updatePlayerTop();
  }
  showContinue('bossNext()');
}

function bossWin(){
  S.bosses[CW.id] = true;
  gainCoins(80); gainXP(150);
  checkBadge('boss-slayer', true);
  checkBadge('conqueror', WORLDS.every(w=>S.bosses[w.id]));
  save();
  const idx = WORLDS.findIndex(w=>w.id===CW.id);
  const next = WORLDS[idx+1];
  modal(`
    <span class="m-emoji">🏆</span>
    <h2>¡Boss vencido!</h2>
    <p>${CW.boss.name} se retira derrotado. ${next ? `¡Desbloqueaste el mundo <b>${next.ico} ${next.name}</b>!` : '¡Conquistaste TODOS los mundos! 👑'}</p>
    <div class="rewards">
      <div class="reward">+150 ⚡XP</div>
      <div class="reward">+80 🪙</div>
      <div class="reward">👑 Sello</div>
    </div>
    <button class="btn btn-coral" onclick="closeModal();go('scr-home')">¡Victoria!</button>
  `);
}

function bossLose(){
  modal(`
    <span class="m-emoji">💨</span>
    <h2>${bossHP>0?'Te quedaste sin corazones':'¡Casi!'}</h2>
    <p>${CW.boss.name} resiste… Bruno dice: repasá las historias de ${CW.name} y volvé más fuerte. 🐶</p>
    <button class="btn btn-coral" onclick="closeModal();go('scr-world')">Reintentar luego</button>
  `);
}

  document.getElementById('profile-msg').innerHTML =

}

function resetGame(){
  if(confirm('¿Borrar todo el progreso? Esto no se puede deshacer.')){
    localStorage.removeItem('wordyssey');
    S = structuredClone(DEFAULT);
    save();
    go('scr-home');
    toast('Progreso reiniciado 🐶');
  }
}

/* ---------- UTILS ---------- */
function shuffle(a){
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function shuffleStable(arr, seed){
  let h = 0; for(const c of seed) h = (h*31 + c.charCodeAt(0)) >>> 0;
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){ h = (h*1103515245 + 12345) >>> 0; const j = h % (i+1); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
