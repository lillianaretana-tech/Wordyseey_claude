<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Wordyssey — Turn Words Into Adventures</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Atkinson+Hyperlegible:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --night:#0E2A33;
  --deep:#16404C;
  --deeper:#0A1F26;
  --cream:#FFF6E8;
  --cream-dim:#F3E7D3;
  --ink:#1E2B30;
  --ink-soft:#5A6B70;
  --coral:#FF7A59;
  --coral-dark:#E05E3F;
  --gold:#FFC65C;
  --mint:#57C7A4;
  --mint-dark:#2E8F73;
  --red:#FF6B6B;
  --radius:18px;
  --shadow:0 6px 18px rgba(0,0,0,.25);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
html{font-size:18.5px}
body{
  font-family:'Atkinson Hyperlegible',system-ui,sans-serif;
  background:var(--night);
  background-image:
    radial-gradient(circle at 15% 10%, rgba(255,198,92,.06), transparent 40%),
    radial-gradient(circle at 85% 90%, rgba(87,199,164,.05), transparent 40%);
  color:var(--cream);
  min-height:100dvh;
  display:flex;
  justify-content:center;
}
#app{width:100%;max-width:520px;min-height:100dvh;display:flex;flex-direction:column;position:relative}
h1,h2,h3,.num,.btn{font-family:'Fredoka',sans-serif}

.screen{display:none;flex-direction:column;flex:1;padding:18px 16px 110px;animation:fadeIn .3s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@media (prefers-reduced-motion: reduce){*{animation:none!important;transition:none!important}}

.statsbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:5px;background:var(--deep);border:1px solid rgba(255,246,232,.12);border-radius:999px;padding:6px 12px;font-family:'Fredoka';font-weight:600;font-size:.95rem}
.stat .ico{font-size:1rem}
.levelchip{background:var(--coral);color:#fff;border:none}

.xpwrap{margin:2px 0 18px}
.xptrack{height:12px;background:var(--deeper);border-radius:999px;overflow:hidden;border:1px solid rgba(255,246,232,.1)}
.xpfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--coral));border-radius:999px;width:0%;transition:width .5s ease}
.xplabel{font-size:.8rem;color:var(--cream-dim);margin-top:5px;opacity:.8}

.bruno{display:flex;gap:12px;align-items:flex-start;margin-bottom:20px}
.bruno-face{font-size:2.6rem;line-height:1;filter:drop-shadow(0 3px 6px rgba(0,0,0,.3))}
.bruno-bubble{background:var(--cream);color:var(--ink);border-radius:16px;border-bottom-left-radius:4px;padding:12px 14px;font-size:.98rem;box-shadow:var(--shadow);flex:1}
.bruno-bubble b{color:var(--coral-dark)}

.sectitle{font-size:1.05rem;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--gold);margin:6px 0 12px;display:flex;align-items:center;gap:8px}
.sectitle::after{content:"";flex:1;height:1px;background:rgba(255,246,232,.15)}

.pass{
  position:relative;background:var(--cream);color:var(--ink);
  border-radius:var(--radius);padding:16px 16px 14px;margin-bottom:14px;
  box-shadow:var(--shadow);cursor:pointer;border:none;width:100%;text-align:left;
  font-family:'Atkinson Hyperlegible';
  transition:transform .15s ease;
}
.pass:active{transform:scale(.98)}
.pass::before,.pass::after{
  content:"";position:absolute;width:18px;height:18px;border-radius:50%;
  background:var(--night);top:50%;transform:translateY(-50%);
}
.pass::before{left:-9px}
.pass::after{right:-9px}
.pass .perf{border-top:2px dashed rgba(30,43,48,.25);margin:10px 0}
.pass-route{display:flex;align-items:center;justify-content:space-between;font-family:'Fredoka';font-weight:600}
.pass-route .code{font-size:1.5rem;letter-spacing:.05em}
.pass-route .plane{color:var(--coral);font-size:1.1rem}
.pass-title{font-family:'Fredoka';font-weight:600;font-size:1.15rem;margin:4px 0 2px}
.pass-sub{font-size:.85rem;color:var(--ink-soft)}
.pass-meta{display:flex;justify-content:space-between;align-items:center;font-size:.85rem}
.pass-stars{color:var(--gold);font-size:1rem;letter-spacing:2px}
.pass.locked{filter:grayscale(.6);opacity:.55;cursor:not-allowed}
.pass .stamp-done{
  position:absolute;top:10px;right:14px;transform:rotate(8deg);
  border:2.5px solid var(--mint-dark);color:var(--mint-dark);
  font-family:'Fredoka';font-weight:700;font-size:.7rem;letter-spacing:.12em;
  padding:3px 8px;border-radius:8px;text-transform:uppercase;opacity:.9;
}

.worldgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.world{
  background:var(--deep);border:1px solid rgba(255,246,232,.12);border-radius:var(--radius);
  padding:16px 12px;text-align:center;cursor:pointer;transition:transform .15s ease;color:var(--cream);
  font-family:'Atkinson Hyperlegible';position:relative;
}
.world:active{transform:scale(.97)}
.world .wico{font-size:2.2rem;display:block;margin-bottom:6px}
.world .wname{font-family:'Fredoka';font-weight:600;font-size:1rem}
.world .wsub{font-size:.78rem;color:var(--cream-dim);opacity:.75;margin-top:3px}
.world.locked{opacity:.45}
.world.preview{opacity:.85;border-style:dashed}
.world.preview:after{content:'Vista previa';position:absolute;right:8px;top:8px;background:var(--gold);color:#4A300A;border-radius:999px;padding:4px 7px;font-family:'Fredoka';font-size:.62rem;font-weight:700}
.world.featured{border-color:var(--gold);box-shadow:0 0 0 1px var(--gold), 0 6px 18px rgba(0,0,0,.3)}
.world .wdone{position:absolute;top:8px;right:10px;font-size:1rem}

.goal{display:flex;align-items:center;gap:12px;background:var(--deep);border:1px solid rgba(255,246,232,.1);border-radius:14px;padding:11px 14px;margin-bottom:9px}
.goal .gico{font-size:1.3rem}
.goal .gtext{flex:1;font-size:.93rem}
.goal .gtrack{height:7px;background:var(--deeper);border-radius:99px;margin-top:5px;overflow:hidden}
.goal .gfill{height:100%;background:var(--mint);border-radius:99px;transition:width .4s}
.goal .gcheck{font-size:1.2rem}

.btn{
  display:block;width:100%;border:none;border-radius:16px;padding:15px;
  font-size:1.05rem;font-weight:600;cursor:pointer;transition:transform .12s ease, filter .12s;
  font-family:'Fredoka';
}
.btn:active{transform:scale(.98)}
.btn-coral{background:var(--coral);color:#fff;box-shadow:0 4px 0 var(--coral-dark)}
.btn-coral:active{box-shadow:0 1px 0 var(--coral-dark);transform:translateY(3px)}
.btn-ghost{background:transparent;color:var(--cream-dim);border:1.5px solid rgba(255,246,232,.25)}
.btn-mint{background:var(--mint);color:#06342A;box-shadow:0 4px 0 var(--mint-dark)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.sound-toggle{position:fixed;right:14px;top:14px;z-index:45;width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,246,232,.22);background:var(--deep);color:var(--cream);font-size:1.2rem;box-shadow:var(--shadow);cursor:pointer}
.speak-btn{display:inline-flex;align-items:center;justify-content:center;width:30px;height:30px;border-radius:50%;border:none;background:var(--gold);color:#4A300A;font-size:.95rem;margin-left:6px;vertical-align:middle;cursor:pointer;box-shadow:0 2px 0 rgba(0,0,0,.22)}
.vocab-preview{display:flex;flex-wrap:wrap;gap:8px;margin:8px 0 14px}
.vocab-chip{background:var(--deep);border:1px solid rgba(255,246,232,.13);border-radius:999px;color:var(--cream);padding:7px 9px;font-size:.86rem}

.player-top{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.backbtn{background:var(--deep);border:1px solid rgba(255,246,232,.15);color:var(--cream);border-radius:12px;width:42px;height:42px;font-size:1.2rem;cursor:pointer;flex-shrink:0}
.prog{flex:1;height:12px;background:var(--deeper);border-radius:99px;overflow:hidden;border:1px solid rgba(255,246,232,.1)}
.progfill{height:100%;background:var(--mint);border-radius:99px;width:0%;transition:width .4s}
.hearts{font-size:1.05rem;letter-spacing:1px;flex-shrink:0}

.scenecard{background:var(--cream);color:var(--ink);border-radius:var(--radius);padding:20px 18px;box-shadow:var(--shadow);margin-bottom:14px}
.scene-img{font-size:4rem;text-align:center;display:block;margin-bottom:10px;filter:drop-shadow(0 4px 8px rgba(0,0,0,.15))}
.scene-title{font-family:'Fredoka';font-weight:600;font-size:1.25rem;margin-bottom:8px;text-align:center}
.scene-text{font-size:1.02rem;line-height:1.55}
.scene-text .es{display:block;margin-top:10px;font-size:.88rem;color:var(--ink-soft);font-style:italic}
.speaker{display:flex;align-items:center;gap:8px;font-family:'Fredoka';font-weight:600;color:var(--coral-dark);margin-bottom:8px;font-size:.95rem}
.dialogue{font-size:1.15rem;font-weight:700;line-height:1.45}

.options{display:flex;flex-direction:column;gap:10px}
.opt{
  background:var(--cream);color:var(--ink);border:2px solid transparent;border-radius:14px;
  padding:14px;font-size:1.02rem;text-align:left;cursor:pointer;font-family:'Atkinson Hyperlegible';
  box-shadow:0 3px 0 rgba(0,0,0,.18);transition:transform .1s;
}
.opt:active{transform:scale(.98)}
.opt.correct{background:#E2F7EF;border-color:var(--mint-dark);color:#06342A}
.opt.wrong{background:#FDEAEA;border-color:var(--red);color:#7A2424;animation:shake .3s}
.opt:disabled{cursor:not-allowed}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.feedback{margin-top:12px;padding:12px 14px;border-radius:12px;font-size:.92rem;display:none}
.feedback.ok{display:block;background:rgba(87,199,164,.15);border:1px solid var(--mint);color:#CFF3E6}
.feedback.bad{display:block;background:rgba(255,107,107,.12);border:1px solid var(--red);color:#FFD9D9}

.buildzone{min-height:56px;background:var(--deeper);border:2px dashed rgba(255,246,232,.25);border-radius:14px;padding:10px;display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.wordbank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.chip{
  background:var(--cream);color:var(--ink);border:none;border-radius:10px;padding:9px 14px;
  font-family:'Fredoka';font-weight:600;font-size:1rem;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.2);
}
.chip:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.2)}
.chip.inzone{background:var(--gold)}

.bossheader{background:var(--deeper);border:1px solid rgba(255,107,107,.4);border-radius:var(--radius);padding:14px;margin-bottom:14px;text-align:center}
.bossface{font-size:3rem;display:block;animation:float 2.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.bossname{font-family:'Fredoka';font-weight:700;font-size:1.2rem;color:var(--red);margin:4px 0 8px}
.bosshp{height:16px;background:#3A1212;border-radius:99px;overflow:hidden;border:1px solid rgba(255,107,107,.4)}
.bosshpfill{height:100%;background:linear-gradient(90deg,#FF6B6B,#FF9C6B);width:100%;transition:width .5s ease;border-radius:99px}
.bosshp-label{font-size:.78rem;color:#FFB3B3;margin-top:5px;font-family:'Fredoka'}

.modal-bg{position:fixed;inset:0;background:rgba(5,15,19,.75);display:none;align-items:center;justify-content:center;z-index:50;padding:20px;backdrop-filter:blur(3px)}
.modal-bg.show{display:flex}
.modal{position:relative;background:var(--cream);color:var(--ink);border-radius:22px;padding:26px 22px;width:100%;max-width:380px;text-align:center;animation:pop .35s cubic-bezier(.2,1.4,.4,1)}
.modal-x{position:absolute;right:12px;top:10px;width:34px;height:34px;border:none;border-radius:50%;background:rgba(9,28,34,.08);color:var(--ink);font-size:1.35rem;line-height:1;cursor:pointer}
.modal-x:active{transform:scale(.96)}
@keyframes pop{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal .m-emoji{font-size:3.5rem;display:block;margin-bottom:8px}
.modal h2{font-size:1.5rem;margin-bottom:6px}
.modal p{font-size:.95rem;color:var(--ink-soft);margin-bottom:14px}
.rewards{display:flex;justify-content:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.reward{background:var(--night);color:var(--cream);border-radius:12px;padding:8px 14px;font-family:'Fredoka';font-weight:600;font-size:.95rem}
.bigstars{font-size:2rem;letter-spacing:6px;color:var(--gold);margin-bottom:8px}

.stampgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.stamp{
  aspect-ratio:1;border:2.5px solid rgba(255,246,232,.25);border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  font-size:.6rem;text-align:center;padding:6px;color:var(--cream-dim);opacity:.4;
  font-family:'Fredoka';font-weight:600;text-transform:uppercase;letter-spacing:.04em;
}
.stamp .se{font-size:1.3rem}
.stamp.earned{opacity:1;border-color:var(--gold);color:var(--gold);transform:rotate(-6deg);box-shadow:0 0 14px rgba(255,198,92,.15)}
.stamp.earned:nth-child(even){transform:rotate(5deg)}

.nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:520px;
  background:var(--deeper);border-top:1px solid rgba(255,246,232,.12);
  display:flex;justify-content:space-around;padding:10px 0 max(10px, env(safe-area-inset-bottom));z-index:40;
}
.nav button{background:none;border:none;color:var(--cream-dim);opacity:.55;font-family:'Fredoka';font-weight:600;font-size:.72rem;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 14px}
.nav button .nico{font-size:1.4rem}
.nav button.on{opacity:1;color:var(--gold)}

#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--cream);color:var(--ink);border-radius:14px;padding:11px 18px;font-family:'Fredoka';font-weight:600;box-shadow:var(--shadow);z-index:60;transition:transform .35s cubic-bezier(.2,1.2,.4,1);max-width:90%;text-align:center}
#toast.show{transform:translateX(-50%) translateY(0)}

.center{text-align:center}
.mt{margin-top:14px}
.statrow{display:flex;justify-content:space-between;background:var(--deep);border:1px solid rgba(255,246,232,.1);border-radius:14px;padding:12px 16px;margin-bottom:9px;font-size:1rem}
.statrow b{font-family:'Fredoka';color:var(--gold)}
.sync-card{background:var(--deep);border:1px solid rgba(255,246,232,.13);border-radius:16px;padding:14px;margin-bottom:14px}
.sync-card label{display:block;font-family:'Fredoka';font-weight:600;margin-bottom:8px;color:var(--gold)}
.sync-input{width:100%;background:var(--deeper);border:1.5px solid rgba(255,246,232,.22);border-radius:12px;color:var(--cream);padding:13px 14px;font-size:1rem;font-family:'Atkinson Hyperlegible';margin-bottom:10px}
.sync-input:focus{outline:2px solid var(--gold);border-color:var(--gold)}
.sync-actions{display:flex;gap:8px;flex-wrap:wrap}
.sync-actions .btn{flex:1;min-width:130px}
.sync-note{font-size:.88rem;color:var(--cream-dim);line-height:1.45;margin-top:9px}
.sync-ok{color:var(--mint);font-family:'Fredoka';font-weight:600}
.sync-warn{color:var(--gold);font-family:'Fredoka';font-weight:600}

/* ===== Legibilidad (presbicia): textos más grandes ===== */
.scene-text{font-size:1.14rem;line-height:1.62}
.scene-text .es{font-size:1rem}
.scene-title{font-size:1.38rem}
.dialogue{font-size:1.32rem;line-height:1.5}
.speaker{font-size:1.05rem}
.opt{font-size:1.14rem;padding:16px 15px}
.bruno-bubble{font-size:1.1rem;line-height:1.5}
.pass-title{font-size:1.24rem}
.pass-sub{font-size:.98rem}
.pass-meta{font-size:.95rem}
.chip{font-size:1.12rem;padding:11px 16px}
.btn{font-size:1.16rem}
.feedback{font-size:1.06rem;line-height:1.5}
.goal .gtext{font-size:1.02rem}
.world .wname{font-size:1.08rem}
.world .wsub{font-size:.86rem}
.stat{font-size:1.02rem}
.xplabel{font-size:.92rem}
#cont .btn{margin-top:14px}

/* ===== Juegos de letras ===== */
.game-info{margin-left:auto;font-family:'Fredoka';font-weight:600;font-size:.95rem;background:var(--deep);border:1px solid rgba(255,246,232,.15);border-radius:999px;padding:6px 12px;white-space:nowrap}
.gametip{font-size:.92rem;color:var(--cream-dim);text-align:center;margin-bottom:12px;opacity:.85}
.unlock-alert{background:linear-gradient(135deg,rgba(255,198,92,.2),rgba(87,199,164,.16));border:1.5px solid rgba(255,198,92,.55);border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 8px 20px rgba(0,0,0,.16)}
.unlock-alert b{font-family:'Fredoka';color:var(--gold)}
.unlock-alert p{margin:5px 0 10px;color:var(--cream);font-size:.98rem;line-height:1.45}
.unlock-pills{display:flex;flex-wrap:wrap;gap:8px}
.unlock-pill{background:var(--cream);color:var(--ink);border:none;border-radius:999px;padding:8px 12px;font-family:'Fredoka';font-weight:600;cursor:pointer;box-shadow:0 3px 0 rgba(0,0,0,.18)}
.unlock-pill:active{transform:translateY(2px);box-shadow:0 1px 0 rgba(0,0,0,.18)}
.home-banner{background:linear-gradient(135deg,rgba(255,198,92,.24),rgba(255,107,107,.14));border:1.5px solid rgba(255,198,92,.55);border-radius:18px;padding:14px;margin:12px 0;box-shadow:0 8px 20px rgba(0,0,0,.16)}
.home-banner-title{font-family:'Fredoka';font-weight:700;color:var(--gold);font-size:1.05rem;margin-bottom:5px}
.home-banner p{font-size:.98rem;line-height:1.45;color:var(--cream);margin-bottom:10px}
.home-banner-actions{display:flex;gap:8px;flex-wrap:wrap}
.home-banner-actions .btn{flex:1;min-width:135px}
.practice-chip{display:inline-flex;align-items:center;gap:5px;background:var(--deeper);border:1px solid rgba(255,246,232,.16);border-radius:999px;padding:5px 9px;font-family:'Fredoka';font-size:.85rem;color:var(--cream);margin-bottom:8px}

/* Sopa de letras */
.ws-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
.wsgrid{display:grid;gap:4px;justify-content:center;margin:0 auto 16px;width:max-content}
.wscell{
  width:30px;height:30px;background:var(--cream);color:var(--ink);border:none;border-radius:7px;
  font-family:'Fredoka';font-weight:700;font-size:1rem;cursor:pointer;padding:0;line-height:30px;
}
.wscell.sel{background:var(--gold);transform:scale(.92)}
.wscell.found{background:var(--mint);color:#06342A}
.ws-words{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:8px}
.ws-word{background:var(--deep);border:1px solid rgba(255,246,232,.15);border-radius:999px;padding:7px 14px;font-family:'Fredoka';font-weight:600;font-size:.95rem}
.ws-word small{display:block;font-weight:400;font-size:.72rem;color:var(--cream-dim);opacity:.7;font-family:'Atkinson Hyperlegible'}
.ws-word.got{background:var(--mint);color:#06342A;border-color:var(--mint)}
.ws-word.got .wtxt{text-decoration:line-through}

/* Memoria */
.memgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.memcard{
  aspect-ratio:1;border-radius:14px;background:var(--deep);color:var(--cream);
  border:1px solid rgba(255,246,232,.15);font-family:'Fredoka';font-weight:600;font-size:.92rem;
  cursor:pointer;padding:6px;display:flex;align-items:center;justify-content:center;text-align:center;
  transition:transform .15s;line-height:1.2;
}
.memcard:active{transform:scale(.95)}
.memcard .q{font-size:1.9rem}
.memcard.up{background:var(--cream);color:var(--ink)}
.memcard.done{background:var(--mint);color:#06342A;border-color:var(--mint);opacity:.85}

/* Parejas */
.mtcols{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mtcol{display:flex;flex-direction:column;gap:10px}
.mtbtn{
  background:var(--cream);color:var(--ink);border:2px solid transparent;border-radius:12px;
  padding:14px 8px;font-family:'Fredoka';font-weight:600;font-size:1rem;cursor:pointer;
  box-shadow:0 3px 0 rgba(0,0,0,.18);min-height:54px;
}
.mtbtn.sel{border-color:var(--gold);background:#FFF0D2}
.mtbtn.done{background:var(--mint);color:#06342A;border-color:var(--mint);box-shadow:none;opacity:.7;cursor:default}
.mtbtn.err{animation:shake .3s;border-color:var(--red)}

/* Crucigrama */
.cw-wrap{overflow-x:auto;margin-bottom:12px;-webkit-overflow-scrolling:touch}
.cwgrid{display:grid;gap:3px;justify-content:center;width:max-content;margin:0 auto}
.cwcell{position:relative;width:32px;height:32px}
.cwcell.void{visibility:hidden}
.cwcell input{

<script>
/* =====================================================
   WORDYSSEY v2 — Multi-World Edition
   5 mundos · 15 historias · 5 bosses · vocabulario por mundo
   ===================================================== */

/* ---------- ESTADO ---------- */
const SUPABASE_URL = 'https://zwbhvuydslwwxobovchh.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3Ymh2dXlkc2x3d3hvYm92Y2hoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzNjE5NjgsImV4cCI6MjA5NjkzNzk2OH0.8U7d_dsBrfHQNKqox0BMfcPCi7KT_msUf9UOwlCo3IY';
const SUPABASE_TABLE = 'wordyssey_v2_profiles';
const ACCOUNT_KEY = 'wordyssey_v2_account';
const DEFAULT = {
  level:1, xp:0, coins:50, stars:0, streak:0, lastDay:null,
  stories:{}, bosses:{}, badges:[],
  totalCorrect:0, totalWrong:0, wordsLearned:[], gamesPlayed:0, letterGamesTried:{},
  practiceLevel:1, practiceRounds:0,
  review:{},
  daily:{ day:null, variant:0, storyDone:0, questions:0, xpEarned:0, practiceDone:0, gamesDone:0 }
};
let S = load();
let ACCOUNT = loadAccount();
let syncTimer = null;
let syncBusy = false;
let syncStatus = ACCOUNT ? 'Listo para sincronizar.' : 'Sin cuenta conectada.';

function load(){
  try{
    const raw = localStorage.getItem('wordyssey');
    if(raw){
      const parsed = JSON.parse(raw);
      const merged = Object.assign(structuredClone(DEFAULT), parsed);
      if(!merged.bosses) merged.bosses = {};
      if(!merged.review) merged.review = {};
      merged.daily = Object.assign(structuredClone(DEFAULT.daily), merged.daily || {});
      if(parsed.bossDefeated) merged.bosses.airport = true; /* migración v1 */
      return merged;
    }
  }catch(e){}
  return structuredClone(DEFAULT);
}
function save(sync=true){
  localStorage.setItem('wordyssey', JSON.stringify(S));
  if(sync) scheduleCloudSave();
}

function loadAccount(){
  try{ return JSON.parse(localStorage.getItem(ACCOUNT_KEY)); }
  catch(e){ return null; }
}
function normalizeProfileKey(value){
  return String(value || '').trim().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9@._-]/g, '');
}
function saveAccount(profileKey){
  ACCOUNT = { profileKey, displayName: profileKey, connectedAt: new Date().toISOString() };
  localStorage.setItem(ACCOUNT_KEY, JSON.stringify(ACCOUNT));
}
function clearAccount(){
  ACCOUNT = null;
  localStorage.removeItem(ACCOUNT_KEY);
  syncStatus = 'Cuenta desconectada en este navegador.';
  renderProfile();
}
function cloudHeaders(extra={}){
  return Object.assign({
    apikey: SUPABASE_ANON_KEY,
    Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
    'Content-Type': 'application/json'
  }, extra);
}
function cloudUrl(params=''){
  return `${SUPABASE_URL}/rest/v1/${SUPABASE_TABLE}${params}`;
}
function mergeReviewStats(local={}, remote={}){
  const out = {};
  [...new Set([...Object.keys(remote || {}), ...Object.keys(local || {})])].forEach(k=>{
    const a = local[k] || {};
    const b = remote[k] || {};
    out[k] = {
      correct: Math.max(a.correct || 0, b.correct || 0),
      wrong: Math.max(a.wrong || 0, b.wrong || 0),
      seen: Math.max(a.seen || 0, b.seen || 0),
      last: [a.last, b.last].filter(Boolean).sort().pop() || null
    };
  });
  return out;
}
function mergeProgress(local, remote){
  const base = Object.assign(structuredClone(DEFAULT), remote || {}, local || {});
  base.stories = Object.assign({}, remote?.stories || {}, local?.stories || {});
  base.bosses = Object.assign({}, remote?.bosses || {}, local?.bosses || {});
  base.badges = [...new Set([...(remote?.badges || []), ...(local?.badges || [])])];
  base.wordsLearned = [...new Set([...(remote?.wordsLearned || []), ...(local?.wordsLearned || [])])];
  base.level = Math.max(local?.level || 1, remote?.level || 1);
  base.xp = Math.max(local?.xp || 0, remote?.xp || 0);
  base.coins = Math.max(local?.coins || 0, remote?.coins || 0);
  base.stars = Math.max(local?.stars || 0, remote?.stars || 0);
  base.streak = Math.max(local?.streak || 0, remote?.streak || 0);
  base.totalCorrect = Math.max(local?.totalCorrect || 0, remote?.totalCorrect || 0);
  base.totalWrong = Math.max(local?.totalWrong || 0, remote?.totalWrong || 0);
  base.gamesPlayed = Math.max(local?.gamesPlayed || 0, remote?.gamesPlayed || 0);
  base.letterGamesTried = Object.assign({}, remote?.letterGamesTried || {}, local?.letterGamesTried || {});
  base.review = mergeReviewStats(local?.review || {}, remote?.review || {});
  base.practiceLevel = Math.max(local?.practiceLevel || 1, remote?.practiceLevel || 1);
  base.practiceRounds = Math.max(local?.practiceRounds || 0, remote?.practiceRounds || 0);
  base.daily = Object.assign(structuredClone(DEFAULT.daily), remote?.daily || {}, local?.daily || {});
  base.lastDay = local?.lastDay || remote?.lastDay || null;
  return base;
}
async function cloudFetchProfile(profileKey){
  const url = cloudUrl(`?profile_key=eq.${encodeURIComponent(profileKey)}&select=profile_key,display_name,progress,updated_at&limit=1`);
  const res = await fetch(url, { headers: cloudHeaders() });
  if(!res.ok) throw new Error(await res.text());
  const rows = await res.json();
  return rows[0] || null;
}
async function cloudSaveNow(silent=false){
  if(!ACCOUNT || syncBusy) return;
  syncBusy = true;
  try{
    const payload = {
      profile_key: ACCOUNT.profileKey,
      display_name: ACCOUNT.displayName || ACCOUNT.profileKey,
      progress: S,
      updated_at: new Date().toISOString()
    };
    const res = await fetch(cloudUrl('?on_conflict=profile_key'), {
      method:'POST',
      headers: cloudHeaders({ Prefer:'resolution=merge-duplicates' }),
      body: JSON.stringify(payload)
    });
    if(!res.ok) throw new Error(await res.text());
    syncStatus = `Sincronizado: ${new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}`;
    if(!silent) toast('Progreso guardado en Supabase ☁️');
  }catch(e){
    syncStatus = 'No se pudo sincronizar. Revisá si corriste el SQL.';
    if(!silent) toast('Supabase aún no está listo para guardar.');
  }finally{
    syncBusy = false;
    if(document.getElementById('profile-account')) renderAccountBox();
  }
}
function scheduleCloudSave(){
  if(!ACCOUNT) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(()=>cloudSaveNow(true), 900);
}
async function connectProfile(){
  const input = document.getElementById('profile-key-input');
  const profileKey = normalizeProfileKey(input?.value);
  if(!profileKey){
    toast('Escribí un usuario o correo para sincronizar.');
    return;
  }
  syncStatus = 'Conectando con Supabase...';
  renderAccountBox();
  try{
    saveAccount(profileKey);
    const remote = await cloudFetchProfile(profileKey);
    if(remote?.progress){
      S = mergeProgress(S, remote.progress);
      save(false);
      syncStatus = 'Progreso recuperado y combinado.';
      toast('Progreso recuperado ☁️');
    }else{
      syncStatus = 'Cuenta creada. Guardando progreso...';
      toast('Cuenta creada para guardar tu avance.');
    }
    await cloudSaveNow(true);
    renderHome();
    renderProfile();
  }catch(e){
    syncStatus = 'No se pudo conectar. Falta crear la tabla en Supabase.';
    toast('Falta preparar la tabla de Supabase.');
    renderAccountBox();
  }
}
async function syncProfileNow(){
  if(!ACCOUNT){ toast('Primero conectá un usuario.'); return; }
  try{
    const remote = await cloudFetchProfile(ACCOUNT.profileKey);
    if(remote?.progress){
      S = mergeProgress(S, remote.progress);
      save(false);
      renderHome();
      renderProfile();
    }
    await cloudSaveNow(true);
    toast('Sincronización lista ☁️');
  }catch(e){
    syncStatus = 'No se pudo sincronizar. Revisá el SQL de Supabase.';
    toast('No se pudo sincronizar con Supabase.');
    renderAccountBox();
  }
}
function renderAccountBox(){
  const el = document.getElementById('profile-account');
  if(!el) return;
  if(ACCOUNT){
    el.innerHTML = `
      <div class="sync-card">
        <label>Usuario conectado</label>
        <div class="statrow"><span>${ACCOUNT.displayName || ACCOUNT.profileKey}</span><b>☁️</b></div>
        <div class="sync-actions">
          <button class="btn btn-mint" onclick="syncProfileNow()">Sincronizar</button>
          <button class="btn btn-ghost" onclick="clearAccount()">Desconectar</button>
        </div>
        <div class="sync-note"><span class="sync-ok">${syncStatus}</span><br>Este acceso no usa enlaces por correo: solo recordá este usuario/correo para recuperar tu progreso.</div>
      </div>`;
  }else{
    el.innerHTML = `
      <div class="sync-card">
        <label>Crear o recuperar usuario</label>
        <input class="sync-input" id="profile-key-input" placeholder="tu correo o usuario" autocomplete="username">
        <div class="sync-actions">
          <button class="btn btn-mint" onclick="connectProfile()">Guardar en Supabase</button>
        </div>
        <div class="sync-note"><span class="sync-warn">${syncStatus}</span><br>Usá un dato fácil de recordar. Si existe, Bruno recupera tu pasaporte; si no existe, lo crea.</div>
      </div>`;
  }
  renderHomeAccountBox();
}
function renderHomeAccountBox(){
  const el = document.getElementById('home-account');
  if(!el) return;
  if(ACCOUNT){
    el.innerHTML = `
      <div class="sync-card">
        <label>☁️ Pasaporte en la nube</label>
        <div class="statrow"><span>${ACCOUNT.displayName || ACCOUNT.profileKey}</span><b>Activo</b></div>
        <div class="sync-actions">
          <button class="btn btn-mint" onclick="syncProfileNow()">Sincronizar</button>
          <button class="btn btn-ghost" onclick="go('scr-profile')">Ver cuenta</button>
        </div>
        <div class="sync-note"><span class="sync-ok">${syncStatus}</span></div>
      </div>`;
  }else{
    el.innerHTML = `
      <div class="sync-card">
        <label>☁️ Guardar progreso en Supabase</label>
        <div class="sync-note">Bruno puede guardar tu pasaporte con un usuario o correo. No usa enlaces mágicos ni confirmación cada vez.</div>
        <div class="sync-actions mt">
          <button class="btn btn-mint" onclick="go('scr-profile')">Crear o recuperar usuario</button>
        </div>
      </div>`;
  }
}

function todayStr(){ return new Date().toISOString().slice(0,10); }
function dayVariant(day){
  return String(day || todayStr()).split('').reduce((n,ch)=>n+ch.charCodeAt(0),0) % 4;
}
function checkDay(){
  const t = todayStr();
  if(S.daily.day !== t) S.daily = Object.assign(structuredClone(DEFAULT.daily), { day:t, variant:dayVariant(t) });
  else S.daily = Object.assign(structuredClone(DEFAULT.daily), S.daily || {});
  if(S.lastDay !== t){
    const y = new Date(); y.setDate(y.getDate()-1);
    S.streak = (S.lastDay === y.toISOString().slice(0,10)) ? S.streak + 1 : 1;
    S.lastDay = t;
    save();
  }
}

/* ═══════════════════════════════════════════════════════
   TTS — Text-to-Speech con selección inteligente de voz
   ═══════════════════════════════════════════════════════
   Problema original: sin voz seleccionada → usa la del sistema
   (Samsung TTS en Android = muy robótica).
   Solución: priorizar voces Google/Microsoft Natural/Apple que
   suenan naturales cuando están disponibles, y guardar la
   preferencia del usuario.
   ─────────────────────────────────────────────────────── */

let _ttsVoice  = null;   /* voz seleccionada */
let _ttsReady  = false;  /* voces ya cargadas */
let _ttsWarm   = false;  /* warm-up ejecutado */

/* Orden de preferencia — de más a menos natural */
const TTS_PRIORITY = [
  /* Chrome Android / Chrome Desktop */
  'Google US English',
  'Google UK English Female',
  'Google UK English Male',
  /* Edge / Windows Natural */
  'Microsoft Aria Online (Natural) - English (United States)',
  'Microsoft Jenny Online (Natural) - English (United States)',
  'Microsoft Guy Online (Natural) - English (United States)',
  'Microsoft Zira - English (United States)',
  'Microsoft David - English (United States)',
  /* macOS / iOS */
  'Samantha',   /* macOS / iOS clásico */
  'Nicky',      /* iOS 16+ */
  'Karen',      /* macOS Australiano */
  'Moira',      /* macOS Irlandés */
  'Daniel',     /* macOS Británico */
  'Tessa',      /* macOS Sudafricano */
  /* Otros */
  'Rishi',
  'Veena',
];

function _ttsPickVoice(){
  const voices = window.speechSynthesis.getVoices();
  if(!voices.length) return;

  /* 1. Preferencia guardada por el usuario */
  const saved = localStorage.getItem('wdy_voice');
  if(saved){
    const found = voices.find(v => v.name === saved);
    if(found){ _ttsVoice = found; _ttsReady = true; _ttsWarmUp(); return; }
  }

  /* 2. Lista de prioridad */
  for(const name of TTS_PRIORITY){
    const v = voices.find(v => v.name === name);
    if(v){ _ttsVoice = v; break; }
  }

  /* 3. Fallback: primera voz en inglés disponible */
  if(!_ttsVoice){
    _ttsVoice = voices.find(v => v.lang === 'en-US')
             || voices.find(v => v.lang.startsWith('en'))
             || null;
  }

  _ttsReady = true;
  _ttsWarmUp();
}

/* Warm-up: una primera utterance silenciosa evita el lag/salto de la primera pronunciación real */
function _ttsWarmUp(){
  if(_ttsWarm || !_ttsVoice || !SOUND_ON) return;
  try{
    const u = new SpeechSynthesisUtterance(' ');
    u.volume = 0; u.voice = _ttsVoice; u.lang = 'en-US';
    window.speechSynthesis.speak(u);
    _ttsWarm = true;
  }catch(e){}
}

/* Inicializar al cargar — Chrome necesita el evento, Safari ya tiene las voces */
if('speechSynthesis' in window){
  if(window.speechSynthesis.onvoiceschanged !== undefined){
    window.speechSynthesis.onvoiceschanged = _ttsPickVoice;
  }
  /* Intentar inmediatamente (Safari/Firefox ya tienen las voces) */
  setTimeout(_ttsPickVoice, 50);
}

/* ─── speak principal ───────────────────────────────────
   mode: 'word'     → rate lento (pronunciación clara)
         'sentence' → rate natural (narración)
         'slow'     → muy lento (práctica deliberada)
   ──────────────────────────────────────────────────── */
function speak(text, mode='sentence'){
  if(!SOUND_ON || !('speechSynthesis' in window) || !text) return;
  if(!_ttsReady) _ttsPickVoice();
  try{
    window.speechSynthesis.cancel();
    const clean = String(text).replace(/<[^>]+>/g,'').trim();
    if(!clean) return;
    const u = new SpeechSynthesisUtterance(clean);
    u.lang  = 'en-US';
    u.pitch = 1.0;
    u.volume = 1.0;
    if(mode === 'word'){
      u.rate  = 0.72;   /* pronunciación de vocabulario: lento y claro */
      u.pitch = 1.05;
    } else if(mode === 'slow'){
      u.rate  = 0.62;   /* práctica deliberada */
      u.pitch = 1.05;
    } else {
      u.rate  = 0.86;   /* narración / diálogos */
    }
    if(_ttsVoice) u.voice = _ttsVoice;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

/* Botón de pronunciación para vocabulario (usa mode='word') */
function speakBtn(text){
  const safe = String(text).replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;');

function renderVoicePicker(){

                 border-radius:10px;padding:8px 10px;font-family:Fredoka;font-size:.92rem">
          ${options}
        </select>
        <button class="btn btn-ghost" style="padding:7px 12px;font-size:.85rem"
          onclick="speak('Hello! This is how I sound in English. Good morning!','sentence')">
          ▶ Probar
        </button>
      </div>
      <p style="font-size:.78rem;opacity:.55;margin-top:6px">
        En Android Chrome: <b>Google US English</b> suena excelente.<br>
        En iPhone/iPad: <b>Samantha</b> o <b>Nicky</b> son las mejores.
      </p>
    </div>`;
}

function setVoice(name){
  const voices = window.speechSynthesis.getVoices();
  const found = voices.find(v=>v.name===name);
  if(found){
    _ttsVoice = found;
    localStorage.setItem('wdy_voice', name);
    _ttsWarm = false;
    _ttsWarmUp();
    setTimeout(()=>speak('Hello! This is how I sound in English. Good morning!','sentence'), 120);
  }
}
function audio(){
  if(!SOUND_ON) return null;
  try{
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    if(audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }catch(e){ return null; }
}
function playTone(freq=440, dur=.12, type='sine', gain=.06){
  const ctx = audio();
  if(!ctx) return;
  const osc = ctx.createOscillator();
  const g = ctx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  g.gain.setValueAtTime(gain, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + dur);
  osc.connect(g); g.connect(ctx.destination);
  osc.start(); osc.stop(ctx.currentTime + dur);
}
function playSfx(name){
  if(name==='jump') playTone(520,.08,'square',.045);
  else if(name==='coin'){ playTone(880,.06,'sine',.05); setTimeout(()=>playTone(1170,.07,'sine',.045),55); }
  else if(name==='hit') playTone(150,.16,'sawtooth',.05);
  else if(name==='win'){ playTone(660,.08,'sine',.05); setTimeout(()=>playTone(880,.1,'sine',.05),90); setTimeout(()=>playTone(1320,.16,'sine',.05),190); }
  else if(name==='ok') playTone(760,.08,'sine',.04);
  else if(name==='bad') playTone(180,.12,'triangle',.04);
}

/* ---------- RECOMPENSAS ---------- */
function gainXP(n){
  S.xp += n; S.daily.xpEarned += n;
  let leveled = false;
  while(S.xp >= xpNeeded(S.level)){ S.xp -= xpNeeded(S.level); S.level++; leveled = true; }
  save();
  if(leveled){
    S.coins += 20; save();
    setTimeout(()=>modal(`
      <span class="m-emoji">🎉</span>
      <h2>¡Nivel ${S.level}!</h2>
      <p>Bruno está dando vueltas de la emoción.</p>
      <div class="rewards"><div class="reward">+20 🪙 bonus</div></div>
      <button class="btn btn-coral" onclick="closeModal()">¡Seguimos!</button>
    `), 400);
  }
}
function xpNeeded(lv){ return lv*100; }
function gainCoins(n){ S.coins += n; checkBadge('rich', S.coins>=300); save(); }

function checkBadge(id, cond){
  if(cond && !S.badges.includes(id)){
    S.badges.push(id); save();
    const b = BADGES.find(x=>x.id===id);
    if(b) setTimeout(()=>toast(`🛂 Nuevo sello: ${b.emoji} ${b.name}`), 800);
  }
}
function learnWords(arr){
  arr.forEach(w=>{ if(!S.wordsLearned.includes(w)) S.wordsLearned.push(w); });
  checkBadge('words-50', S.wordsLearned.length>=50);
  save();
}
function reviewKey(kind, item){
  if(kind==='vocab') return `vocab:${item.world || ''}:${item.en}`;
  if(kind==='phrase') return `phrase:${item.world || ''}:${item.q}:${item.a}`;
  return `build:${item.world || ''}:${item.answer}`;
}
function reviewWeight(key){
  const r = S.review?.[key];
  if(!r) return 1;
  return 1 + (r.wrong || 0) * 4 + Math.max(0, (r.seen || 0) - (r.correct || 0));
}
function recordReview(key, ok){
  if(!key) return;
  if(!S.review) S.review = {};
  const r = S.review[key] || { correct:0, wrong:0, seen:0, last:null };
  r.seen++;
  if(ok) r.correct++; else r.wrong++;
  r.last = new Date().toISOString();
  S.review[key] = r;
  save(false);
}
function pickAdaptive(items, kind, count, level){
  const pool = practiceSlice(items, kind, level);
  const scored = shuffle([...pool]).map(item=>{
    const key = reviewKey(kind, item);
    return { item, key, score: reviewWeight(key) + Math.random() * 1.5 };
  }).sort((a,b)=>b.score-a.score);
  return scored.slice(0, count).map(x=>Object.assign({}, x.item, { reviewKey:x.key }));
}

      {ico:'❓', text:'Responder 15 preguntas', cur:S.daily.questions, max:15},
      {ico:'⚡', text:'Ganar 80 XP', cur:S.daily.xpEarned, max:80}
    ],
    [
      {ico:'🎮', text:'Jugar 1 juego de letras', cur:S.daily.gamesDone, max:1},
      {ico:'📖', text:'Completar 1 historia', cur:S.daily.storyDone, max:1},
      {ico:'❓', text:'Responder 12 preguntas', cur:S.daily.questions, max:12}
    ],
    [
      {ico:'🧠', text:'Repasar 10 respuestas', cur:S.daily.questions, max:10},

      {ico:'⚡', text:'Ganar 60 XP', cur:S.daily.xpEarned, max:60}
    ]
  ];
  const goals = goalSets[S.daily.variant || 0] || goalSets[0];
  document.getElementById('goals').innerHTML = goals.map(g=>{
    const p = Math.min(100, g.cur/g.max*100);
    const ok = g.cur>=g.max;
    return `<div class="goal">
      <span class="gico">${g.ico}</span>
      <div class="gtext">${g.text}
        <div class="gtrack"><div class="gfill" style="width:${p}%"></div></div>
      </div>
      <span class="gcheck">${ok?'✅':`<small style="font-family:Fredoka">${g.cur}/${g.max}</small>`}</span>
    </div>`;
  }).join('');

  const wt = document.getElementById('worlds-title');
  if(wt) wt.innerHTML = OWNER
    ? '🗺️ Mundos <span style="font-family:Fredoka;font-weight:700;font-size:.7rem;background:#2EC4B6;color:#04211f;padding:3px 8px;border-radius:999px;margin-left:6px;vertical-align:middle">🔑 MODO DUEÑA</span>'
    : '🗺️ Mundos';

  document.getElementById('worlds').innerHTML = WORLDS.map((w,i)=>{
    const open = worldUnlocked(i);
    const realDone = !!S.bosses[WORLDS[i-1]?.id] || i===0;
    const doneCount = w.stories.filter(st=>S.stories[st.id]).length;
    const bossDone = !!S.bosses[w.id];
    const ownerOnly = OWNER && !realDone; /* abierto solo por modo dueña */
    const sub = open
      ? (ownerOnly ? `🔑 Vista de dueña · ${w.stories.length} historias`
                   : `${doneCount}/${w.stories.length} historias${bossDone?' · 👑':''}`)
      : `${w.stories.length} historias · ${w.boss.emoji} ${w.boss.name}`;
    return `<button class="world ${open?(bossDone?'':'featured'):'locked preview'}" onclick="${open?`openWorld(${i})`:`previewWorld(${i})`}">
      ${bossDone?'<span class="wdone">👑</span>':''}
      <span class="wico">${open?w.ico:w.ico}</span>
      <span class="wname">${w.name}</span>
      <div class="wsub">${sub}</div>
    </button>`;
  }).join('');
}

function letterGames(){
  return [
    {id:'wordsearch', fn:'startWordSearch', ico:'🔍', name:'Sopa de letras', sub:'Encontrá las palabras escondidas', need:3},
    {id:'memory',     fn:'startMemory',     ico:'🧠', name:'Memoria',         sub:'Encontrá las parejas EN ↔ ES',     need:6},
    {id:'match',      fn:'startMatch',      ico:'🔗', name:'Parejas',         sub:'Relacioná palabra y traducción',   need:9},
    {id:'crossword',  fn:'startCrossword',  ico:'✏️', name:'Crucigrama',     sub:'Escribí en inglés según la pista', need:12}
  ];
}
function gameTryKey(id){ return `${CW.id}:${id}`; }
function markLetterGameTried(id){
  if(!S.letterGamesTried) S.letterGamesTried = {};
  S.letterGamesTried[gameTryKey(id)] = true;
  save();
}
function gameUnlockAlert(games, doneCount){
  const fresh = games.filter(g=>doneCount>=g.need && !S.letterGamesTried?.[gameTryKey(g.id)]);
  if(!fresh.length) return '';
  const names = fresh.map(g=>`${g.ico} ${g.name}`).join(', ');
  return `<div class="unlock-alert">
    <b>🎮 Bruno desbloqueó ${fresh.length===1?'un juego nuevo':'juegos nuevos'}</b>
    <p>${names}. Probalo desde aquí; estos juegos ayudan a repasar sin sentir que estás repitiendo ejercicios.</p>
    <div class="unlock-pills">${fresh.map(g=>`<button class="unlock-pill" onclick="${g.fn}()">${g.ico} Jugar ${g.name}</button>`).join('')}</div>
  </div>`;
}
function runnerBridgeCard(allDone, bossDone){
  const idx = WORLDS.findIndex(w=>w.id===CW.id);
  const next = WORLDS[idx+1];
  if(!next) return '';
  if(bossDone){
    return `<button class="mini" onclick="startBrunoRun(true)"><span class="wico">🐶</span><span class="wname">Bruno Run libre</span><div class="wsub">Rejugá la carrera hacia ${next.ico} ${next.name}</div></button>`;
  }
  if(allDone){
    return `<button class="mini featured" onclick="startBrunoRun()"><span class="wico">🐶</span><span class="wname">Nuevo: Bruno Run</span><div class="wsub">Corre, salta y llega a ${next.ico} ${next.name}</div></button>`;
  }
  const faltan = CW.stories.filter(st=>!S.stories[st.id]).length;
  return `<button class="mini" style="opacity:.5" onclick="toast('🐶 Bruno Run: completá ${faltan} historia${faltan===1?'':'s'} más')"><span class="wico">🔒</span><span class="wname">Bruno Run</span><div class="wsub">Puente al siguiente mundo · faltan ${faltan} historia${faltan===1?'':'s'}</div></button>`;
}
function unlockedWorlds(){
  return WORLDS.filter((w,i)=>worldUnlocked(i));
}
function openLetterGameCount(){
  return unlockedWorlds().reduce((total,w)=>{
    const doneCount = w.stories.filter(st=>S.stories[st.id]).length;
    return total + letterGames().filter(g=>doneCount>=g.need).length;
  },0);
}
function practiceLevelName(){
  const names = ['Principiante','Explorador','Intermedio','Aventurero','Avanzado'];
  return names[Math.max(0, Math.min(4, (S.practiceLevel||1)-1))];
}

/* =====================================================
   STORY ENGINE
   ===================================================== */
let SP = null;

function startStory(id){
  const story = CW.stories.find(s=>s.id===id);
  SP = { story, i:0, mistakes:0, hearts:3, mode:'story' };
  go('scr-story');
  renderNode();
}

function confirmExit(){
  if(confirm('¿Salir de la aventura? Perdés el progreso de esta historia.')){
    const back = SP && SP.practice ? 'scr-home' : 'scr-world';
    SP = null; go(back);
  }
}

function updatePlayerTop(){
  const total = SP.mode==='story' ? SP.story.nodes.length :
                SP.mode==='challenge' ? SP.qs.length : CW.boss.questions.length;
  document.getElementById('story-prog').style.width = (SP.i/total*100)+'%';
  document.getElementById('story-hearts').textContent = '❤️'.repeat(SP.hearts)+'🖤'.repeat(3-SP.hearts);
}

function renderNode(){
  updatePlayerTop();
  const node = SP.story.nodes[SP.i];
  const stage = document.getElementById('story-stage');
  if(!node){ finishStory(); return; }

  if(node.t==='scene'){
    stage.innerHTML = `
      <div class="scenecard">
        <span class="scene-img">${node.img}</span>
        <div class="scene-title">${node.title} ${narrateSceneBtn(node)}</div>
        <div class="scene-text">${node.en}<span class="es">${node.es}</span></div>
      </div>
      <button class="btn btn-coral" onclick="nextNode()">Continuar →</button>`;
    setTimeout(()=>narrateScene(node), 180);
  }
  else if(node.t==='decision'){
    stage.innerHTML = `
      <div class="scenecard">
        <div class="speaker">${node.speaker}</div>
        <div class="dialogue">"${node.line}"</div>
      </div>
      <div class="options">${node.opts.map((o,idx)=>
        `<button class="opt" onclick="pickOpt(${idx})">${o.x}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>`;
  }
  else if(node.t==='fill'){
    stage.innerHTML = `
      <div class="scenecard">
        <div class="speaker">🐶 Bruno</div>
        <div class="dialogue">${node.q}</div>
      </div>
      <div class="options">${shuffle([...node.opts]).map(o=>
        `<button class="opt" onclick="pickFill(this,'${String(o).replace(/'/g,"\\'")}')">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>`;
  }
  else if(node.t==='build'){
    SP.built = [];
    stage.innerHTML = `
      <div class="scenecard">
        <div class="speaker">🐶 Bruno</div>
        <div class="dialogue">Ordená la frase: <span style="color:var(--ink-soft);font-size:.9rem;font-weight:400">(${node.es})</span></div>
      </div>
      <div class="buildzone" id="bz"></div>
      <div class="wordbank" id="wb"></div>
      <div class="feedback" id="fb"></div>
      <button class="btn btn-mint mt" onclick="checkBuild()">Comprobar</button>`;
    renderBuild(node);
  }
}

function renderBuild(node){
  const bz = document.getElementById('bz'), wb = document.getElementById('wb');
  bz.innerHTML = SP.built.map((w,i)=>`<button class="chip inzone" onclick="unpick(${i})">${w}</button>`).join('');
  const remaining = [...node.words];
  SP.built.forEach(w=>{ const k = remaining.indexOf(w); if(k>-1) remaining.splice(k,1); });
  wb.innerHTML = shuffleStable(remaining, node.words.join('')).map(w=>
    `<button class="chip" onclick="pickWord('${w.replace(/'/g,"\\'")}')">${w}</button>`).join('');
}
function pickWord(w){ SP.built.push(w); renderBuild(SP.story.nodes[SP.i]); }
function unpick(i){ SP.built.splice(i,1); renderBuild(SP.story.nodes[SP.i]); }

function buildOK(node, attempt){
  const targets = [node.answer.toLowerCase()];
  if(node.alt) targets.push(node.alt.toLowerCase());
  return targets.includes(attempt);
}

function checkBuild(){
  const node = SP.story.nodes[SP.i];
  const attempt = SP.built.join(' ').toLowerCase();
  const fb = document.getElementById('fb');
  const ok = buildOK(node, attempt);
  registerAnswer(ok);
  if(ok){
    playSfx('ok');
    speak(node.alt || node.answer);
    fb.className = 'feedback ok';
    fb.innerHTML = `✅ <b>"${node.alt || node.answer}"</b> — ${node.es}`;
    learnWords((node.alt || node.answer).split(' '));
    showContinue('nextNode()');
  }else{
    playSfx('bad');
    fb.className = 'feedback bad';
    fb.textContent = '❌ Casi… reordená las palabras y volvé a Comprobar, o tocá "Ver respuesta".';
    loseHeart();
    showContinue('revealBuild()', 'Ver respuesta →');
  }
}

function pickOpt(idx){
  const node = SP.story.nodes[SP.i];
  const o = node.opts[idx];
  const btns = document.querySelectorAll('.opt');
  const fb = document.getElementById('fb');
  registerAnswer(o.ok);
  btns.forEach(b=>b.disabled=true);
  node.opts.forEach((op,k)=>{ if(op.ok) btns[k].classList.add('correct'); });
  if(o.ok){
    playSfx('ok');
    speak(o.x);
    fb.className='feedback ok'; fb.textContent = '✅ ' + o.fb;
  }else{
    playSfx('bad');
    btns[idx].classList.add('wrong');
    fb.className='feedback bad'; fb.textContent = '❌ ' + o.fb;
    loseHeart();
  }
  showContinue('nextNode()');
}

function pickFill(btn, val){
  const node = SP.story.nodes[SP.i];
  const fb = document.getElementById('fb');
  const ok = String(val) === String(node.a);
  registerAnswer(ok);
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===String(node.a)) b.classList.add('correct');
  });
  if(ok){
    playSfx('ok');
    speak(String(node.a));
    fb.className='feedback ok'; fb.textContent = '✅ ' + node.fb;
    learnWords([String(node.a)]);
  }else{
    playSfx('bad');
    btn.classList.add('wrong');
    fb.className='feedback bad'; fb.textContent = '❌ ' + node.fb;
    loseHeart();
  }
  showContinue('nextNode()');
}

function registerAnswer(ok){
  S.daily.questions++;
  if(ok) S.totalCorrect++; else { S.totalWrong++; if(SP) SP.mistakes++; }
  const total = S.totalCorrect + S.totalWrong;
  checkBadge('accuracy-80', total>=50 && Math.round(S.totalCorrect/total*100)>=80);
  save();
}

function loseHeart(){
  if(SP.hearts>0) SP.hearts--;
  updatePlayerTop();
}

function nextNode(){ SP.i++; renderNode(); }

/* Botón explícito de avance (reemplaza temporizadores automáticos) */
function showContinue(onClick, label){
  let c = document.getElementById('cont');
  if(!c){
    c = document.createElement('div');
    c.id = 'cont';
    document.getElementById('story-stage').appendChild(c);
  }
  c.innerHTML = `<button class="btn btn-coral" onclick="${onClick}">${label||'Continuar →'}</button>`;
  c.querySelector('.btn').scrollIntoView({block:'nearest', behavior:'smooth'});
}
function chNext(){ SP.i++; renderChallengeQ(); }
function chReveal(){
  const q = SP.qs[SP.i];
  const fb = document.getElementById('fb');
  fb.className='feedback ok'; fb.innerHTML = `✅ La frase correcta es: <b>"${q.answer}"</b>`;
  showContinue('chNext()');
}
function revealBuild(){
  const node = SP.story.nodes[SP.i];
  const fb = document.getElementById('fb');
  fb.className='feedback ok'; fb.innerHTML = `✅ La frase correcta es: <b>"${node.alt || node.answer}"</b> — ${node.es}`;
  showContinue('nextNode()');
}
function bossNext(){
  if(bossHP<=0){ bossWin(); return; }
  if(SP.hearts<=0){ bossLose(); return; }
  SP.i++; renderBossQ();
}

function finishStory(){
  const st = SP.story;
  const stars = SP.mistakes===0 ? 3 : SP.mistakes<=2 ? 2 : 1;
  const prev = S.stories[st.id] || 0;
  const wasNew = prev===0;
  if(stars > prev){
    S.stars += (stars - prev);
    S.stories[st.id] = stars;
  }
  S.daily.storyDone++;
  gainCoins(st.reward.coins);
  gainXP(st.reward.xp);
  checkBadge('first-steps', true);
  checkBadge('perfect', stars===3);
  checkBadge('master-'+CW.id, CW.stories.every(s=>S.stories[s.id]));
  checkBadge('streak-3', S.streak>=3);
  save();

  /* ¿Esta historia desbloqueó un juego de letras? (cada 3 completadas) */
  let unlock = '';
  if(wasNew){
    const doneCount = CW.stories.filter(s=>S.stories[s.id]).length;
    const map = {3:'🔍 Sopa de letras', 6:'🧠 Memoria', 9:'🔗 Parejas', 12:'✏️ Crucigrama'};
    if(map[doneCount]) unlock = `<div class="reward" style="background:var(--mint);color:#06342A">🎮 ¡Desbloqueaste ${map[doneCount]}!</div>`;
  }

  modal(`
    <span class="m-emoji">🎉</span>
    <h2>¡Historia completada!</h2>
    <div class="bigstars">${'★'.repeat(stars)}${'☆'.repeat(3-stars)}</div>
    <p>${unlock ? 'Bruno encontró un juego nuevo para vos. 🐶' : (stars===3?'¡Perfecto! Sin errores. Bruno está impresionado 🐶':'¡Bien hecho! Repetila para ganar las 3 estrellas.')}</p>
    <div class="rewards">
      <div class="reward">+${st.reward.xp} ⚡XP</div>
      <div class="reward">+${st.reward.coins} 🪙</div>
      ${unlock}
    </div>
    <button class="btn btn-coral" onclick="closeModal();go('scr-world')">Continuar</button>
  `);
}

function practicePool(){
  return {
    vocab: WORLDS.flatMap(w=>w.vocab.map(v=>({...v, world:w.name}))),
    phrases: WORLDS.flatMap(w=>w.phrases.map(p=>({...p, world:w.name}))),
    unscramble: WORLDS.flatMap(w=>w.unscramble.map(u=>({...u, world:w.name})))
  };
}
function practiceDifficulty(item, kind){
  if(kind==='vocab'){
    const en = item.en || '';
    return (en.includes(' ') ? 2 : 0) + Math.ceil(en.length/6);
  }
  if(kind==='phrase'){
    const q = item.q || '';
    return 1 + Math.ceil(q.length/28);
  }
  const words = item.words || [];
  return 1 + Math.ceil(words.length/3);
}
function practiceSlice(items, kind, level){
  const maxDifficulty = level + 1;
  const filtered = items.filter(item=>practiceDifficulty(item, kind) <= maxDifficulty);
  return filtered.length >= 4 ? filtered : items;
}
function startGlobalPractice(){
  const pool = practicePool();
  const level = S.practiceLevel || 1;
  const qs = [];
  const vocabCount = level <= 2 ? 6 : 4;
  const phraseCount = level <= 1 ? 2 : level <= 3 ? 4 : 3;
  const buildCount = level <= 2 ? 2 : level <= 4 ? 3 : 5;
  const vocabPool = pickAdaptive(pool.vocab, 'vocab', vocabCount, level);
  const phrasePool = pickAdaptive(pool.phrases, 'phrase', phraseCount, level);
  const buildPool = pickAdaptive(pool.unscramble, 'build', buildCount, level);

  vocabPool.forEach(v=>{
    const wrong = shuffle(pool.vocab.filter(x=>x.en!==v.en)).slice(0,2).map(x=>x.es);
    qs.push({type:'choice', q:`${v.world}: ¿qué significa "${v.en}"?`, opts:shuffle([v.es,...wrong]), a:v.es, learn:[v.en], reviewKey:v.reviewKey});
  });
  phrasePool.forEach(p=>{
    qs.push({type:'choice', q:`${p.world}: ${p.q}`, opts:shuffle([...p.opts]), a:p.a, learn:[p.a], reviewKey:p.reviewKey});
  });
  buildPool.forEach(u=>{
    qs.push({type:'build', words:u.words, answer:u.answer, es:u.es, reviewKey:u.reviewKey});
  });

  SP = { mode:'challenge', practice:true, qs:shuffle(qs).slice(0,10), i:0, mistakes:0, hearts:3, score:0 };
  go('scr-story');
  document.getElementById('mainnav').style.display='none';
  renderChallengeQ();
}
function startChallenge(){
  const qs = [];
  shuffle([...CW.vocab]).slice(0,4).forEach(v=>{
    const wrong = shuffle(CW.vocab.filter(x=>x.en!==v.en)).slice(0,2).map(x=>x.es);
    qs.push({type:'choice', q:`¿Qué significa "${v.en}"?`, opts:shuffle([v.es,...wrong]), a:v.es, learn:[v.en]});
  });
  shuffle([...CW.phrases]).slice(0,3).forEach(p=>{
    qs.push({type:'choice', q:p.q, opts:shuffle([...p.opts]), a:p.a, learn:[p.a]});
  });
  shuffle([...CW.unscramble]).slice(0,3).forEach(u=>{
    qs.push({type:'build', words:u.words, answer:u.answer, es:u.es});
  });
  SP = { mode:'challenge', practice:false, qs:shuffle(qs), i:0, mistakes:0, hearts:3, score:0 };
  go('scr-story');
  document.getElementById('mainnav').style.display='none';
  renderChallengeQ();
}

function renderChallengeQ(){
  updatePlayerTop();
  const q = SP.qs[SP.i];
  const stage = document.getElementById('story-stage');
  if(!q || SP.hearts===0){ finishChallenge(); return; }

  if(q.type==='choice'){
    stage.innerHTML = `
      <div class="scenecard">
        <div class="speaker">⚡ Reto ${SP.i+1}/${SP.qs.length}</div>
        <div class="dialogue">${q.q}</div>
      </div>
      <div class="options">${q.opts.map(o=>
        `<button class="opt" onclick="chAnswer(this,'${o.replace(/'/g,"\\'")}')">${o}</button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>`;
  }else{
    SP.built = [];
    stage.innerHTML = `
      <div class="scenecard">
        <div class="speaker">⚡ Reto ${SP.i+1}/${SP.qs.length}</div>
        <div class="dialogue">Ordená: <span style="color:var(--ink-soft);font-size:.9rem;font-weight:400">(${q.es})</span></div>
      </div>
      <div class="buildzone" id="bz"></div>
      <div class="wordbank" id="wb"></div>
      <div class="feedback" id="fb"></div>
      <button class="btn btn-mint mt" onclick="chCheckBuild()">Comprobar</button>`;
    chRenderBuild(q);
  }
}
function chRenderBuild(q){
  document.getElementById('bz').innerHTML = SP.built.map((w,i)=>`<button class="chip inzone" onclick="chUnpick(${i})">${w}</button>`).join('');
  const remaining = [...q.words];
  SP.built.forEach(w=>{ const k=remaining.indexOf(w); if(k>-1) remaining.splice(k,1); });
  document.getElementById('wb').innerHTML = shuffleStable(remaining, q.words.join('')).map(w=>
    `<button class="chip" onclick="chPick('${w.replace(/'/g,"\\'")}')">${w}</button>`).join('');
}
function chPick(w){ SP.built.push(w); chRenderBuild(SP.qs[SP.i]); }
function chUnpick(i){ SP.built.splice(i,1); chRenderBuild(SP.qs[SP.i]); }

function chCheckBuild(){
  const q = SP.qs[SP.i];
  const ok = SP.built.join(' ').toLowerCase() === q.answer.toLowerCase();
  registerAnswer(ok);
  if(SP.practice) recordReview(q.reviewKey, ok);
  const fb = document.getElementById('fb');
  if(ok){
    playSfx('ok');
    speak(q.answer);
    SP.score++;
    fb.className='feedback ok'; fb.innerHTML = `✅ <b>"${q.answer}"</b>`;
    showContinue('chNext()');
  }else{
    playSfx('bad');
    fb.className='feedback bad'; fb.textContent='❌ Reordená y volvé a Comprobar, o tocá "Ver respuesta".';
    loseHeart();
    showContinue('chReveal()', 'Ver respuesta →');
  }
}

function chAnswer(btn, val){
  const q = SP.qs[SP.i];
  const ok = val === q.a;
  registerAnswer(ok);
  if(SP.practice) recordReview(q.reviewKey, ok);
  const fb = document.getElementById('fb');
  document.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.textContent===String(q.a)) b.classList.add('correct');
  });
  if(ok){
    playSfx('ok');
    speak(String(q.a));
    SP.score++;
    if(q.learn) learnWords(q.learn);
    fb.className='feedback ok'; fb.textContent='✅ ¡Correcto!';
  }else{
    playSfx('bad');
    btn.classList.add('wrong');
    fb.className='feedback bad'; fb.textContent=`❌ La respuesta era: ${q.a}`;
    loseHeart();
  }
  showContinue('chNext()');
}

function finishChallenge(){
  const xp = SP.score*8, coins = SP.score*4;
  const isPractice = !!SP.practice;
  let levelNote = '';
  if(isPractice){
    const before = S.practiceLevel || 1;
    S.practiceRounds = (S.practiceRounds || 0) + 1;
    S.daily.practiceDone = (S.daily.practiceDone || 0) + 1;
    checkBadge('practice-5', S.practiceRounds>=5);
    if(SP.score >= 8) S.practiceLevel = Math.min(5, before + 1);
    else if(SP.score <= 4) S.practiceLevel = Math.max(1, before - 1);
    if(S.practiceLevel > before) levelNote = `Bruno subió tu práctica a <b>${practiceLevelName()}</b>.`;
    else if(S.practiceLevel < before) levelNote = `Bruno bajó un poco la dificultad para reforzar bases.`;
    else levelNote = `Seguís en práctica <b>${practiceLevelName()}</b>.`;
  }
  gainCoins(coins); gainXP(xp); save();
  modal(`
    <span class="m-emoji">${SP.score>=8?'🏆':SP.score>=5?'💪':'🐶'}</span>
    <h2>${isPractice?'Práctica libre':'Ronda completa'}: ${SP.score}/${SP.qs.length}</h2>
    <p>${isPractice ? levelNote : (SP.score>=8?'¡Velocidad de jet! Bruno aplaude con la cola.':SP.score>=5?'¡Buen trabajo! Cada ronda te hace más fuerte.':'Bruno dice: los errores también enseñan. ¡Una más!')}</p>
    <div class="rewards">
      <div class="reward">+${xp} ⚡XP</div>
      <div class="reward">+${coins} 🪙</div>
    </div>
    <button class="btn btn-coral" onclick="closeModal();go('${isPractice?'scr-home':'scr-world'}')">Continuar</button>
  `);
}

let GM = null; /* estado del juego activo */

function exitGame(){
  /* Runner no necesita confirm: no hay progreso que perder mid-run */
  if(GM && GM.dirty && GM.game !== 'runner' && !confirm('¿Salir del juego? Perdés el avance de esta ronda.')) return;
  if(GM && GM._timer) clearInterval(GM._timer);
  if(GM && GM._raf) cancelAnimationFrame(GM._raf);
  window.onkeydown = null;
  window.onkeyup = null;
  GM = null;
  go('scr-world');
}

function gameHeader(title, info){
  document.getElementById('game-title').textContent = title;
  document.getElementById('game-info').innerHTML = info || '';
}
function gameBruno(msg){ document.getElementById('game-bruno').innerHTML = msg; }

function finishGame(emoji, title, msg, xp, coins){
  if(GM && GM._timer) clearInterval(GM._timer);
  if(GM && GM._raf) cancelAnimationFrame(GM._raf);
  S.gamesPlayed++;
  S.daily.gamesDone = (S.daily.gamesDone || 0) + 1;
  checkBadge('gamer', true);
  checkBadge('arcade-10', S.gamesPlayed>=10);
  gainCoins(coins); gainXP(xp); save();
  GM = null;
  modal(`
    <span class="m-emoji">${emoji}</span>
    <h2>${title}</h2>
    <p>${msg}</p>
    <div class="rewards">
      <div class="reward">+${xp} ⚡XP</div>
      <div class="reward">+${coins} 🪙</div>
    </div>
    <button class="btn btn-coral" onclick="closeModal();go('scr-world')">Continuar</button>
  `);
}

/* Vocabulario apto para juegos de letras: una sola palabra, solo letras, 3-8 chars */
function gameVocab(max){
  const list = CW.vocab.filter(v=>/^[a-zA-Z]+$/.test(v.en) && v.en.length>=3 && v.en.length<=8);
  return shuffle([...list]).slice(0, max);
}

/* ============ 🐶 BRUNO RUN ============ */
function startBrunoRun(replay=false){
  const idx = WORLDS.findIndex(w=>w.id===CW.id);
  const next = WORLDS[idx+1];
  if(!next){ toast('Bruno ya llegó al último mundo.'); return; }
  if(!CW.stories.every(st=>S.stories[st.id])){
    toast('Completá todas las historias para abrir Bruno Run.'); return;
  }

  /* ── Física corregida ──────────────────────────────────────────
     ground = 158 → Bruno parado: box y=116..156  ducking: y=136..160
     CONE  y=130 h=30 → parado toca (156>130✓), saltando (bottom~108<130) pasa
     BIRD  y=100 h=30 → parado toca (116<130✓), agachado  (top=136>130) pasa
  ──────────────────────────────────────────────────────────────── */
  GM = {
    game:'runner', dirty:true, next, worldId:CW.id, replay,
    x:56, y:158, vy:0, ground:158, duck:false,
    distance:0,
    goal: 6500,        /* ~25 s a velocidad promedio 4.1  */
    speed: 3.2,
    maxSpeed: 6.2,
    accel: 0.0007,
    coins:0, hits:0, frame:0, stumbles:0,
    obstacles:[], tokens:[],
    lastObstacle: 180, /* tramo libre de arranque */
    lastToken: 50,
    milestone: 0,      /* 0-3: mensajes en 25/50/75 % */
    done: false
  };

  go('scr-game');
  gameHeader('🐶 Bruno Run',
    '<span id="rn-pct" style="font-family:Fredoka;font-weight:700">0%</span>');
  gameBruno(replay
    ? 'Bruno vuelve a correr hacia <b>'+next.ico+' '+next.name+'</b>. ⚡ Saltá conos · ⏬ Agachate bajo los pájaros. 🐾'
    : 'Bruno corre hacia <b>'+next.ico+' '+next.name+'</b>. '
      +'<b>⬆️ Saltar</b> esquiva los conos del suelo · '
      +'<b>⬇️ Agacharse</b> esquiva los pájaros. ¡Llegá al portal! 🐾');

  document.getElementById('game-stage').innerHTML =
    '<div class="runner-hud" style="display:flex;justify-content:space-between;align-items:center;'
    +'margin-bottom:4px;font-family:Fredoka;font-weight:700;font-size:1rem">'
    +'<span>🎯 '+next.ico+' '+next.name+'</span>'
    +'<span>�DE99<span id="rn-coins2">0</span></span></div>'
    +'<div style="height:9px;background:var(--deeper);border-radius:99px;margin-bottom:6px;'
    +'overflow:hidden;border:1px solid rgba(255,246,232,.15)">'
    +'<div id="rn-bar" style="height:100%;background:linear-gradient(90deg,#2EC4B6,#FFD166);'
    +'width:0%;border-radius:99px;transition:width .25s ease"></div></div>'
    +'<div class="runner-wrap" onclick="runnerJump()" style="cursor:pointer;user-select:none;-webkit-user-select:none">'
    +'<canvas id="runner-canvas" width="420" height="220"></canvas></div>'
    +'<div class="runner-controls">'
    +'<button class="btn btn-mint" onpointerdown="runnerJump()">⬆️ Saltar</button>'
    +'<button class="btn btn-ghost" onpointerdown="runnerDuck(true)" onpointerup="runnerDuck(false)"'
    +' onpointerleave="runnerDuck(false)" ontouchend="runnerDuck(false)">⬇️ Agacharse</button>'
    +'</div>';

  window.onkeydown = e=>{
    if(GM?.game!=='runner') return;
    if(e.code==='Space'||e.code==='ArrowUp'){ e.preventDefault(); runnerJump(); }
    if(e.code==='ArrowDown'){ e.preventDefault(); runnerDuck(true); }
  };
  window.onkeyup = e=>{ if(GM?.game==='runner'&&e.code==='ArrowDown') runnerDuck(false); };
  setTimeout(()=>{ if(GM&&GM.game==='runner') GM._raf=requestAnimationFrame(runnerLoop); }, 80);
}

function runnerJump(){
  if(!GM||GM.game!=='runner') return;
  if(GM.y>=GM.ground-1){ playSfx('jump'); GM.vy=-13; GM.y=GM.ground-1; }
}

function runnerDuck(on){
  if(GM&&GM.game==='runner') GM.duck = on && GM.y>=GM.ground-2;
}

function runnerLoop(){
  if(!GM||GM.game!=='runner'||GM.done) return;
  const c=document.getElementById('runner-canvas');
  if(!c){ GM._raf=requestAnimationFrame(runnerLoop); return; }
  const ctx=c.getContext('2d');
  GM.frame++;

  /* ── Movimiento ── */
  GM.distance += GM.speed;
  GM.speed = Math.min(GM.maxSpeed, GM.speed+GM.accel);
  GM.vy += 0.62;
  GM.y = Math.min(GM.ground, GM.y+GM.vy);
  if(GM.y>=GM.ground){ GM.y=GM.ground; GM.vy=0; }

  /* ── Obstáculos: gap se reduce con la distancia (sube dificultad) ── */
  const gap = Math.max(145, 200 - GM.distance*0.006);
  if(GM.distance-GM.lastObstacle > gap){
    GM.lastObstacle = GM.distance + 55 + Math.random()*55;
    const isBird = Math.random()>.55;
    GM.obstacles.push(isBird
      ? {kind:'bird', x:430, y:100, w:34, h:30, hit:false}
      : {kind:'cone', x:430, y:130, w:28, h:30, hit:false});
  }

  /* ── Monedas ── */
  if(GM.distance-GM.lastToken > 85+Math.random()*40){
    GM.lastToken=GM.distance;
    GM.tokens.push({x:430, y:108+Math.random()*34, r:9, got:false});
  }

  /* ── Mover sprites ── */
  GM.obstacles.forEach(o=>o.x-=GM.speed);
  GM.tokens.forEach(t=>t.x-=GM.speed);
  GM.obstacles=GM.obstacles.filter(o=>o.x>-50);
  GM.tokens=GM.tokens.filter(t=>t.x>-20&&!t.got);

  /* ── Hitbox Bruno ──
     parado:   y=116..156   ducking: y=136..160
     CONE y=130..160 → parado HIT, saltando (bottom<130) CLEAR
     BIRD y=100..130 → parado HIT (top=116<130), agachado (top=136>130) CLEAR */
  const bx=GM.x+6, bw=26;
  const by=GM.duck ? GM.y-24 : GM.y-42;
  const bh=GM.duck ? 24       : 40;

  for(const o of GM.obstacles){
    if(o.hit) continue;
    if(bx<o.x+o.w && bx+bw>o.x && by<o.y+o.h && by+bh>o.y){
      o.hit=true; GM.hits++; playSfx('hit');
      if(GM.hits%3===0){
        GM.stumbles++;
        GM.distance=Math.max(0,GM.distance-150);
        GM.speed=Math.max(3.2,GM.speed-0.5);
        gameBruno('Bruno tropezó pero se sacudió y sigue. ¡No te rindás!');
      } else {
        gameBruno(o.kind==='cone'
          ? 'Saltá los conos del suelo con ⬆️'
          : 'Agachaté bajo los pájaros con ⬇️');
      }
    }
  }

  for(const t of GM.tokens){
    if(bx<t.x+t.r*2 && bx+bw>t.x && by<t.y+t.r*2 && by+bh>t.y){
      t.got=true; GM.coins++; playSfx('coin');
    }
  }

  /* ── Milestones ── */
  const pct=Math.min(100,Math.floor(GM.distance/GM.goal*100));
  const ms=[
    {at:25,msg:'🐾 ¡25%! Bruno está calentando. ¡Seguí!'},
    {at:50,msg:'⚡ ¡Mitad del camino! Bruno huele el portal de '+GM.next.name+'.'},
    {at:75,msg:'🔥 ¡75%! El portal ya brilla. ¡Un empujón más!'}
  ];
  ms.forEach((m,i)=>{ if(pct>=m.at&&GM.milestone===i){ GM.milestone=i+1; gameBruno(m.msg); } });

  runnerDraw(ctx,c,{x:GM.x,y:by,w:bw,h:bh});

  /* HUD */
  const el=id=>document.getElementById(id);
  ['rn-pct','rn-hud-pct'].forEach(id=>{ const e=el(id); if(e) e.textContent=pct+'%'; });
  const bar=el('rn-bar'); if(bar) bar.style.width=pct+'%';
  ['rn-coins','rn-coins2'].forEach(id=>{ const e=el(id); if(e) e.textContent=GM.coins; });

  if(GM.distance>=GM.goal){ runnerWin(); return; }
  GM._raf=requestAnimationFrame(runnerLoop);
}

function runnerDraw(ctx,c,bruno){
  const W=c.width, H=c.height, GR=GM.ground;

  /* Cielo */
  const sky=ctx.createLinearGradient(0,0,0,128);
  sky.addColorStop(0,'#4FACDE'); sky.addColorStop(1,'#8FD3F4');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,128);

  /* Nubes animadas */
  ctx.fillStyle='rgba(255,255,255,.88)';
  [[100,.15,30,22],[240,.1,24,18],[360,.2,20,15],[50,.08,18,14]].forEach(([bx,spd,r1,r2],i)=>{
    const x=((bx-GM.distance*spd)%520+520)%520-30;
    const y=22+i*16;
    ctx.beginPath();
    ctx.arc(x,y,r1,0,Math.PI*2);
    ctx.arc(x+r1+4,y-4,r1+2,0,Math.PI*2);
    ctx.arc(x+r1*2+10,y,r2,0,Math.PI*2);
    ctx.fill();
  });

  /* Suelo degradado */
  const grass=ctx.createLinearGradient(0,128,0,H);
  grass.addColorStop(0,'#68D391'); grass.addColorStop(1,'#38A169');
  ctx.fillStyle=grass; ctx.fillRect(0,128,W,H-128);

  /* Pista */
  ctx.fillStyle='#D4A857'; ctx.fillRect(0,GR-8,W,H-GR+8);
  ctx.fillStyle='#B8892E'; ctx.fillRect(0,GR,W,3);

  /* Marcas animadas en la pista */
  for(let i=0;i<9;i++){
    const x=((i*56-GM.distance*.75)%504+504)%504;
    ctx.fillStyle='rgba(255,255,255,.55)';
    ctx.fillRect(x,GR-3,34,3);
  }

  /* Monedas */
  GM.tokens.forEach(t=>{
    if(t.got) return;
    const pulse=1+Math.sin(GM.frame*.2)*.12;
    ctx.save();
    ctx.translate(t.x+t.r,t.y+t.r);
    ctx.scale(pulse,pulse);
    ctx.fillStyle='#FFD166';
    ctx.beginPath(); ctx.arc(0,0,t.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#7A5315'; ctx.font='bold 9px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('W',0,1);
    ctx.restore();
  });

  /* Obstáculos */
  GM.obstacles.forEach(o=>{
    if(o.kind==='bird'){
      /* Pájaro con alas animadas */
      ctx.save();
      ctx.translate(o.x+17,o.y+10);
      ctx.font='26px serif';
      ctx.fillText('🦅',0,Math.sin(GM.frame*.25)*3);
      ctx.restore();
    } else {
      /* Cono con sombra */
      ctx.fillStyle='rgba(0,0,0,.12)';
      ctx.beginPath();
      ctx.ellipse(o.x+14,o.y+o.h+2,12,4,0,0,Math.PI*2);
      ctx.fill();
      ctx.font='24px serif';
      ctx.fillText('🚧',o.x,o.y+o.h+2);
    }
  });

  /* Portal (destino) con glow */
  const glow=4+Math.sin(GM.frame*.15)*3;
  ctx.save();
  ctx.shadowColor='#FFD166'; ctx.shadowBlur=glow*3;
  ctx.fillStyle='#553098';
  ctx.fillRect(W-58,72,9,GR-72);
  ctx.restore();
  ctx.fillStyle='#FFD166'; ctx.fillRect(W-49,76,28,18);
  ctx.font='24px serif'; ctx.fillText(GM.next.ico,W-66,70);

  /* Bruno con bob */
  const onGround=GM.y>=GM.ground-2;
  const bob=onGround ? Math.sin(GM.frame*.32)*2.5 : 0;
  ctx.font=(GM.duck?'26px':'34px')+' serif';
  ctx.fillText('🐶',GM.x, GM.y+(GM.duck?2:-3)+bob);
}

function runnerWin(){
  if(!GM||GM.done) return;
  GM.done=true;
  playSfx('win');
  if(GM._raf) cancelAnimationFrame(GM._raf);
  window.onkeydown=null; window.onkeyup=null;

  const idx=WORLDS.findIndex(w=>w.id===GM.worldId);
  const next=GM.next;
  const firstBridge=!S.bosses[GM.worldId];
  S.bosses[GM.worldId]=true;

  const xp=(firstBridge?90:35)+GM.coins*3;
  const coins=(firstBridge?45:15)+GM.coins;
  checkBadge('boss-slayer',true);
  gainCoins(coins); gainXP(xp); save();

  const stumbleNote = GM.stumbles
    ? ' Bruno tropezó '+GM.stumbles+' vez'+(GM.stumbles===1?'':'es')+' y siguió sin rendirse.'
    : ' 🌟 ¡Sin un solo tropiezo!';

  modal(

/* ============ 🔍 SOPA DE LETRAS ============ */
function startWordSearch(){
  markLetterGameTried('wordsearch');
  const picks = gameVocab(7);
  const size = 11;
  let grid = Array.from({length:size},()=>Array(size).fill(''));
  const dirs = [[0,1],[1,0],[1,1],[1,-1]]; /* horizontal, vertical, dos diagonales */
  const placed = [];

  picks.forEach(v=>{
    const word = v.en.toUpperCase();
    let done = false;
    for(let tries=0; tries<120 && !done; tries++){
      const [dr,dc] = dirs[Math.floor(Math.random()*dirs.length)];
      const r0 = Math.floor(Math.random()*size);
      const c0 = Math.floor(Math.random()*size);
      const rEnd = r0 + dr*(word.length-1);
      const cEnd = c0 + dc*(word.length-1);
      if(rEnd<0||rEnd>=size||cEnd<0||cEnd>=size) continue;
      let fits = true;
      for(let k=0;k<word.length;k++){
        const ch = grid[r0+dr*k][c0+dc*k];
        if(ch!=='' && ch!==word[k]){ fits=false; break; }
      }
      if(!fits) continue;
      const cells = [];
      for(let k=0;k<word.length;k++){
        grid[r0+dr*k][c0+dc*k] = word[k];
        cells.push((r0+dr*k)+'-'+(c0+dc*k));
      }
      placed.push({word, es:v.es, cells, found:false});
      done = true;
    }
  });

  const ABC='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  for(let r=0;r<size;r++) for(let c=0;c<size;c++) if(grid[r][c]==='') grid[r][c]=ABC[Math.floor(Math.random()*26)];

  GM = { game:'ws', grid, size, words:placed, sel:[], dirty:true, seconds:0 };
  go('scr-game');
  gameHeader('🔍 Sopa de letras', '⏱️ <span id="ws-time">0:00</span>');
  gameBruno('Bruno escondió <b>'+placed.length+' palabras</b> del aeropuerto, restaurante o el mundo en que estés. Tocá la primera y la última letra de cada palabra. ¡A buscar! 🦴');
  renderWS();
  GM._timer = setInterval(()=>{
    GM.seconds++;
    const m=Math.floor(GM.seconds/60), s=GM.seconds%60;
    const el=document.getElementById('ws-time'); if(el) el.textContent=`${m}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

function renderWS(){
  const stage = document.getElementById('game-stage');
  const foundCells = new Set();
  GM.words.filter(w=>w.found).forEach(w=>w.cells.forEach(c=>foundCells.add(c)));
  let html = '<div class="ws-wrap"><div class="wsgrid" style="grid-template-columns:repeat('+GM.size+',1fr)">';
  for(let r=0;r<GM.size;r++) for(let c=0;c<GM.size;c++){
    const id=r+'-'+c;
    const cls = foundCells.has(id)?'found':(GM.sel.includes(id)?'sel':'');
    html += `<button class="wscell ${cls}" onclick="wsTap(${r},${c})">${GM.grid[r][c]}</button>`;
  }
  html += '</div></div>';
  html += '<div class="ws-words">'+GM.words.map(w=>
    `<span class="ws-word ${w.found?'got':''}"><span class="wtxt">${w.word}</span><small>${w.es}</small></span>`).join('')+'</div>';
  stage.innerHTML = html;
}

function wsTap(r,c){
  const id=r+'-'+c;
  if(GM.sel.length===0){ GM.sel=[id]; renderWS(); return; }
  if(GM.sel.length===1 && GM.sel[0]===id){ GM.sel=[]; renderWS(); return; }
  /* segunda selección: calcular línea recta */
  const [r0,c0]=GM.sel[0].split('-').map(Number);
  const dr=Math.sign(r-r0), dc=Math.sign(c-c0);
  const len=Math.max(Math.abs(r-r0),Math.abs(c-c0))+1;
  const straight = (r===r0)||(c===c0)||(Math.abs(r-r0)===Math.abs(c-c0));
  if(!straight){ GM.sel=[id]; renderWS(); return; }
  const path=[]; let str='';
  for(let k=0;k<len;k++){ const rr=r0+dr*k, cc=c0+dc*k; path.push(rr+'-'+cc); str+=GM.grid[rr][cc]; }
  const rev=str.split('').reverse().join('');
  const hit = GM.words.find(w=>!w.found && (w.word===str||w.word===rev));
  if(hit){
    hit.found=true; GM.sel=[]; learnWords([hit.word.toLowerCase()]);
    if(GM.words.every(w=>w.found)){
      renderWS();
      const bonus = GM.seconds<60?15:0;
      finishGame('🏆','¡Sopa completada!',
        `Encontraste las ${GM.words.length} palabras en ${Math.floor(GM.seconds/60)}:${String(GM.seconds%60).padStart(2,'0')}.${bonus?' ¡Bonus por rapidez! ⚡':''} Bruno mueve la cola con orgullo. 🐾`,
        GM.words.length*6 + bonus, GM.words.length*4);
      return;
    }
    gameBruno('¡Encontraste <b>'+hit.word+'</b> ('+hit.es+')! Quedan '+GM.words.filter(w=>!w.found).length+'. 🦴');
  }else{
    GM.sel=[];
    gameBruno('Esa no era… probá otra. Bruno te ayuda a olfatear 🐶');
  }
  renderWS();
}

  const picks = gameVocab(6);
  let cards=[];
  picks.forEach((v,i)=>{
    cards.push({pair:i, txt:v.en, lang:'en'});
    cards.push({pair:i, txt:v.es, lang:'es'});
  });
  cards = shuffle(cards).map((c,idx)=>({...c, idx, up:false, done:false}));
  GM = { game:'mem', cards, open:[], moves:0, dirty:true, lock:false };
  go('scr-game');
  gameHeader('🧠 Memoria', '<span id="mem-moves">0</span> jugadas');
  gameBruno('Encontrá cada palabra en inglés con su traducción. Bruno ya memorizó todas… pero no te va a soplar 😄');
  renderMem();
}
function renderMem(){
  document.getElementById('game-stage').innerHTML =
    '<div class="memgrid">'+GM.cards.map(c=>{
      const cls = c.done?'done':(c.up?'up':'');
      const face = (c.up||c.done)?c.txt:'<span class="q">?</span>';
      return `<button class="memcard ${cls}" onclick="memTap(${c.idx})">${face}</button>`;
    }).join('')+'</div>';
  const mv=document.getElementById('mem-moves'); if(mv) mv.textContent=GM.moves;
}
function memTap(idx){
  if(GM.lock) return;
  const card = GM.cards.find(c=>c.idx===idx);
  if(card.up||card.done) return;
  card.up=true; GM.open.push(card); renderMem();
  if(GM.open.length===2){
    GM.moves++; GM.lock=true;
    const [a,b]=GM.open;
    if(a.pair===b.pair){
      setTimeout(()=>{
        a.done=b.done=true; GM.open=[]; GM.lock=false; renderMem();
        learnWords([(a.lang==='en'?a.txt:b.txt).toLowerCase()]);
        if(GM.cards.every(c=>c.done)){
          const xp = Math.max(20, 60-GM.moves*2);
          finishGame('🧠','¡Memoria perfecta!',
            `Uniste las 6 parejas en ${GM.moves} jugadas. Bruno está impresionado con tu cerebro. 🐾`,
            xp, 28);
        }else{
          gameBruno('¡Pareja! 🎉 '+a.txt+' = '+b.txt);
        }
      }, 550);
    }else{
      setTimeout(()=>{
        a.up=b.up=false; GM.open=[]; GM.lock=false; renderMem();
        gameBruno('No coinciden. Bruno dice: recordá dónde estaban 🧠');
      }, 850);
    }
  }
}
